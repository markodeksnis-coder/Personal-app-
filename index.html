<!DOCTYPE html>

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leyvix OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background:#f9f9f8; color:#111111; font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#c8c8c4; border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background:#a0a09c; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
    input::placeholder, textarea::placeholder { color:#71717a; }
    button { font-family:'Inter',sans-serif; cursor:pointer; }
    button:hover { opacity:0.85; }
    textarea { font-family:'Inter',sans-serif; color:#111111; }
    select option { background:#ffffff; color:#111111; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0); cursor:pointer; }

<body>
  
<style>
#lx-bar{
  position:fixed;top:0;left:220px;right:0;z-index:9999;
  height:44px;
  background:#ffffff;
  border-bottom:1px solid #e4e4e0;
  border-left:1px solid #e4e4e0;
  display:flex;align-items:center;
  padding:0 20px;gap:20px;
  font-family:'Inter',Arial,sans-serif;font-size:12.5px;
  letter-spacing:0.01em;
}
#lx-bar-focus{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden}
#lx-bar-focus .lbl{color:#999999;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;flex-shrink:0}
#lx-bar-focus .sentence{color:#111111;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#lx-bar-right{display:flex;align-items:center;gap:20px;flex-shrink:0}
.lx-stat{display:flex;align-items:center;gap:7px}
.lx-stat .lbl{color:#999999;font-size:11px;text-transform:uppercase;letter-spacing:0.08em}
.lx-stat .val{color:#111111;font-weight:600}
#lx-track{width:72px;height:3px;background:#e8e8e4;border-radius:2px;overflow:hidden}
#lx-track-fill{height:100%;background:#6c63ff;border-radius:2px;transition:width 0.4s}
.pace-ok{color:#16a34a!important}
.pace-warn{color:#d97706!important}
.pace-bad{color:#dc2626!important}
</style>
<div id="lx-bar">
  <div id="lx-bar-focus">
    <span class="lbl">Now</span>
    <span class="sentence" id="lx-sentence">—</span>
  </div>
  <div id="lx-bar-right">
    <div class="lx-stat">
      <span class="lbl">Today</span>
      <div id="lx-track"><div id="lx-track-fill" style="width:0%"></div></div>
      <span class="val" id="lx-pct">0%</span>
    </div>
    <div class="lx-stat">
      <span class="lbl">Pace</span>
      <span class="val" id="lx-pace">—</span>
    </div>
  </div>
</div>
<script>
(function(){
  function update(){
    var pri=[];var nn=[];
    try{pri=JSON.parse(localStorage.getItem('lx4_pri')||'[]')}catch(e){}
    try{nn=JSON.parse(localStorage.getItem('lx4_nn')||'[]')}catch(e){}

    // Find #1 high-leverage undone task
    var focusTask=null,focusProj=null,focusProjName=null;
    outer1:for(var i=0;i<pri.length;i++){
      var p=pri[i];if(p.done)continue;
      var projs=p.projects||[];
      for(var j=0;j<projs.length;j++){
        var tasks=projs[j].tasks||[];
        for(var k=0;k<tasks.length;k++){
          var t=tasks[k];
          if(!t.done&&t.leverage==='high'){focusTask=t;focusProj=p;focusProjName=projs[j].name;break outer1;}
        }
      }
    }
    // Fallback: any undone task
    if(!focusTask){
      outer2:for(var i=0;i<pri.length;i++){
        if(pri[i].done)continue;
        var projs=pri[i].projects||[];
        for(var j=0;j<projs.length;j++){
          var tasks=projs[j].tasks||[];
          for(var k=0;k<tasks.length;k++){
            if(!tasks[k].done){focusTask=tasks[k];focusProj=pri[i];focusProjName=projs[j].name;break outer2;}
          }
        }
      }
    }

    // Build a full readable sentence
    var sentence;
    if(!focusTask){
      sentence='All tasks done — great work!';
    } else {
      sentence='Work on: ' + focusTask.text + ' — ' + focusProjName + ' (P' + focusProj.num + ')';
    }
    var sentEl=document.getElementById('lx-sentence');
    if(sentEl) sentEl.textContent=sentence;

    // Today progress from daily actions
    var done=nn.filter(function(x){return x.done;}).length;
    var total=nn.length;
    var pct=total>0?Math.round(done/total*100):0;
    var fillEl=document.getElementById('lx-track-fill');
    var pctEl=document.getElementById('lx-pct');
    if(fillEl)fillEl.style.width=pct+'%';
    if(pctEl)pctEl.textContent=pct+'%';

    // Pace: scan deadlines
    var todayStr=new Date().toISOString().slice(0,10);
    var overdue=0,dueToday=0;
    for(var i=0;i<pri.length;i++){
      var projs=pri[i].projects||[];
      for(var j=0;j<projs.length;j++){
        var tasks=projs[j].tasks||[];
        for(var k=0;k<tasks.length;k++){
          var t=tasks[k];
          if(t.done||!t.deadline)continue;
          if(t.deadline<todayStr)overdue++;
          else if(t.deadline===todayStr)dueToday++;
        }
      }
    }
    var paceEl=document.getElementById('lx-pace');
    if(paceEl){
      paceEl.className='val';
      if(overdue>0){paceEl.textContent=overdue+' overdue';paceEl.classList.add('pace-bad');}
      else if(dueToday>0){paceEl.textContent=dueToday+' due today';paceEl.classList.add('pace-warn');}
      else{paceEl.textContent='On track';paceEl.classList.add('pace-ok');}
    }
  }

  function init(){
    var root=document.getElementById('root');
    if(root)root.style.paddingTop='136px';
    update();
    setInterval(update,2000);
  }

  document.readyState==='loading'
    ? document.addEventListener('DOMContentLoaded',init)
    : setTimeout(init,200);
})();
</script>

<div id="lx-nums">

<script>
(function(){
  // ── Storage ──────────────────────────────────────────────────────────────
  function weekStart(){
    var d=new Date(),day=d.getDay()||7;
    var mon=new Date(d); mon.setDate(d.getDate()-day+1);
    return mon.toISOString().slice(0,10);
  }
  function dayKey(offset){
    var d=new Date(); d.setDate(d.getDate()-(offset||0));
    return 'lx4_d_'+d.toISOString().slice(0,10);
  }
  function getDay(offset){ try{return JSON.parse(localStorage.getItem(dayKey(offset))||'{}');}catch(e){return {};} }
  function saveDay(data){ localStorage.setItem(dayKey(0),JSON.stringify(data)); }
  function getGoals(){ try{return JSON.parse(localStorage.getItem('lx4_goals')||'{}');}catch(e){return {};} }
  function saveGoals(g){ localStorage.setItem('lx4_goals',JSON.stringify(g)); }

  // Weekly sum for a metric (Mon–today)
  function weekSum(key){
    var ws=weekStart(); var total=0;
    for(var i=0;i<=6;i++){
      var d=new Date(); d.setDate(d.getDate()-i);
      if(d.toISOString().slice(0,10)<ws) break;
      var data=getDay(i); total+=(data[key]||0);
    }
    return total;
  }

  function countDone(){
    var pri=[];try{pri=JSON.parse(localStorage.getItem('lx4_pri')||'[]');}catch(e){}
    var n=0;
    pri.forEach(function(p){(p.projects||[]).forEach(function(pr){(pr.tasks||[]).forEach(function(t){if(t.done)n++;});});});
    return n;
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function set(id,v){var e=document.getElementById(id);if(e&&e.tagName!=='INPUT')e.textContent=v;}

  function refresh(){
    var goals=getGoals();
    set('ln-tasks-cur', countDone());
    set('ln-tasks-goal', goals.tasks||'—');
    ['sms','calls','meetings'].forEach(function(k){
      set('ln-'+k+'-cur', weekSum(k));
      set('ln-'+k+'-goal', goals[k]||'—');
    });
  }

  // ── Actions ──────────────────────────────────────────────────────────────
  window.lxInc=function(key){
    var d=getDay(0); d[key]=(d[key]||0)+1; saveDay(d); refresh();
  };

  function makeInp(currentVal,fontSize,width,onCommit){
    var inp=document.createElement('input');
    inp.type='number'; inp.className='lx-mini-inp';
    inp.style.fontSize=fontSize+'px'; inp.style.width=width+'px';
    inp.value=currentVal; inp.min=0;
    inp.addEventListener('blur',function(){ onCommit(parseInt(inp.value)||0); });
    inp.addEventListener('keydown',function(e){ if(e.key==='Enter')inp.blur(); e.stopPropagation(); });
    return inp;
  }

  window.lxCurEdit=function(key,el){
    var cur=weekSum(key);
    var inp=makeInp(cur,26,50,function(val){
      var otherDays=0;
      for(var i=1;i<=6;i++){var d=new Date();d.setDate(d.getDate()-i);if(d.toISOString().slice(0,10)<weekStart())break;otherDays+=(getDay(i)[key]||0);}
      var todayVal=Math.max(0,val-otherDays);
      var d=getDay(0); d[key]=todayVal; saveDay(d);
      var span=document.createElement('span');
      span.className='lx-cur'; span.id='ln-'+key+'-cur';
      span.setAttribute('onclick','lxCurEdit(''+key+'',this)');
      inp.replaceWith(span); refresh();
    });
    el.replaceWith(inp); inp.focus(); inp.select();
  };

  window.lxGoalEdit=function(key,el){
    var goals=getGoals();
    var inp=makeInp(goals[key]||0,14,40,function(val){
      var g=getGoals(); g[key]=val; saveGoals(g);
      var span=document.createElement('span');
      span.className='lx-goal'; span.id='ln-'+key+'-goal';
      span.setAttribute('onclick','lxGoalEdit(''+key+'',this)');
      inp.replaceWith(span); refresh();
    });
    inp.style.color='#888888'; inp.style.borderBottomColor='#888888';
    el.replaceWith(inp); inp.focus(); inp.select();
  };

  refresh();
  setInterval(refresh,3000);
})();
</script>

<script>
(function(){
  var cb = null;

  window.__lxEdit = function(task, projId, D) {
    cb = { task: task, projId: projId, D: D };
    document.getElementById('lx-edit-task-text').textContent = task.text;
    document.getElementById('lx-edit-notes').value = task.notes || '';
    document.getElementById('lx-edit-leverage').value = task.leverage || 'high';
    document.getElementById('lx-edit-deadline').value = task.deadline || '';
    document.getElementById('lx-edit-overlay').classList.add('open');
    setTimeout(function(){ document.getElementById('lx-edit-notes').focus(); }, 50);
  };

  window.lxEditClose = function() {
    document.getElementById('lx-edit-overlay').classList.remove('open');
    cb = null;
  };

  window.lxEditSave = function() {
    if (!cb) return;
    var notes    = document.getElementById('lx-edit-notes').value;
    var leverage = document.getElementById('lx-edit-leverage').value;
    var deadline = document.getElementById('lx-edit-deadline').value || null;

    var pri = [];
    try { pri = JSON.parse(localStorage.getItem('lx4_pri') || '[]'); } catch(e) {}
    var proj = null;
    for (var i = 0; i < pri.length; i++) {
      var p = (pri[i].projects || []).find(function(x){ return x.id === cb.projId; });
      if (p) { proj = p; break; }
    }
    if (proj) {
      var updatedTasks = proj.tasks.map(function(t) {
        return t.id === cb.task.id
          ? Object.assign({}, t, { notes: notes, leverage: leverage, deadline: deadline })
          : t;
      });
      cb.D(cb.projId, updatedTasks);
    }
    lxEditClose();
  };
})();
</script>

  <div id="root"></div>
  <script>
// ── Task rollover: run BEFORE React mounts ────────────────────────────────
(function(){
  try {
    var today=new Date().toISOString().slice(0,10);
    var tasks=JSON.parse(localStorage.getItem('lx4_tasks')||'{}');
    if(!tasks[today]||tasks[today].length===0){
      for(var i=1;i<=7;i++){
        var d=new Date(); d.setDate(d.getDate()-i);
        var key=d.toISOString().slice(0,10);
        var prev=tasks[key]||[];
        var incomplete=prev.filter(function(t){return !t.done;});
        if(incomplete.length>0){
          tasks[today]=incomplete;
          localStorage.setItem('lx4_tasks',JSON.stringify(tasks));
          break;
        }
      }
    }
  } catch(e){}
})();
// ── Collapse all priorities after React renders ───────────────────────────
(function(){
  function collapseAll(){
    document.querySelectorAll('span,div').forEach(function(el){
      if(el.textContent==='▾'&&el.style.transform==='rotate(180deg)'){
        var btn=el.closest('[style*="cursor: pointer"],[style*="cursor:pointer"]');
        if(btn) btn.click();
      }
    });
  }
  setTimeout(collapseAll,800);
  setTimeout(collapseAll,1500);
