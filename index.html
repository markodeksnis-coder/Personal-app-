<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #030712;
      background-image: radial-gradient(ellipse 90% 45% at 50% 0%, rgba(37,99,235,.15) 0%, transparent 70%);
      min-height: 100vh;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, { useState, useEffect } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm';
const html = htm.bind(React.createElement);

// ── Storage ──────────────────────────────────────────────
const KEY = 'perf-v1';
function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const today = () => ds(new Date());
const loadLogs  = () => { try { return JSON.parse(localStorage.getItem(KEY)||'[]'); } catch { return []; } };
const saveLogs  = logs => localStorage.setItem(KEY, JSON.stringify(logs.slice(-90)));
const getToday  = logs => logs.find(l=>l.date===today()) || {date:today(),gym:null,calories:null,protein:null};
const upsert    = (logs, log) => {
  const idx=logs.findIndex(l=>l.date===log.date), next=[...logs];
  idx>=0 ? next[idx]=log : next.push(log);
  return next.sort((a,b)=>a.date.localeCompare(b.date));
};
const last14 = () => Array.from({length:14},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(13-i)); return ds(d); });
const weekDays = () => {
  const d=new Date(), mon=new Date(d);
  mon.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));
  return Array.from({length:7},(_,i)=>{ const dd=new Date(mon); dd.setDate(mon.getDate()+i); return ds(dd); });
};
const streak = (logs, fn) => {
  let s=0; const d=new Date();
  for(let i=0;i<90;i++){ const l=logs.find(x=>x.date===ds(d)); if(l&&fn(l))s++; else break; d.setDate(d.getDate()-1); }
  return s;
};

// ── Scoring ───────────────────────────────────────────────
const CG=2200, CB=3500, PG=150;
const calScore = v => v<=CG ? 100 : Math.max(0,Math.round(((CB-v)/(CB-CG))*100));
const proScore = v => Math.min(100,Math.round((v/PG)*100));
const dayScore = log => {
  const s=[]; if(log.calories!=null)s.push(calScore(log.calories)); if(log.protein!=null)s.push(proScore(log.protein));
  return s.length ? Math.round(s.reduce((a,b)=>a+b)/s.length) : null;
};

// ── ScoreRing ─────────────────────────────────────────────
function ScoreRing({score}) {
  const [on,setOn] = useState(false);
  useEffect(()=>{ const t=setTimeout(()=>setOn(true),100); return ()=>clearTimeout(t); },[]);
  const r=78, circ=2*Math.PI*r, off=on&&score!=null?circ-(score/100)*circ:circ;
  return html`
    <div style=${{width:200,height:200,position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <svg width="200" height="200" style=${{transform:'rotate(-90deg)'}}>
        <circle cx="100" cy="100" r=${r} fill="none" stroke="#1f2937" strokeWidth="14"/>
        ${score!=null && html`
          <circle cx="100" cy="100" r=${r} fill="none" stroke="#3b82f6" strokeWidth="14"
            strokeLinecap="round"
            strokeDasharray=${`${circ} ${circ}`}
            strokeDashoffset=${off}
            style=${{transition:'stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1)',filter:'drop-shadow(0 0 10px #3b82f6)'}}
          />
        `}
      </svg>
      <div style=${{position:'absolute',textAlign:'center'}}>
        <div style=${{fontSize:42,fontWeight:900,color:'white',lineHeight:1}}>${score!=null?`${score}%`:'—'}</div>
        <div style=${{fontSize:11,color:'#6b7280',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:6}}>
          ${score!=null?"today's score":'start logging'}
        </div>
      </div>
    </div>
  `;
}

// ── NumInput ──────────────────────────────────────────────
function NumInput({value,goal,step,min,max,onChange}) {
  return html`
    <div className="flex items-center gap-3">
      <button onClick=${()=>onChange(Math.max(min,(value??goal)-step))}
        className="w-10 h-10 rounded-full bg-gray-800 border border-gray-700 text-gray-300 text-xl font-black hover:bg-gray-700 transition flex items-center justify-center"
      >−</button>
      <input type="number" value=${value??''} placeholder="—"
        onInput=${e=>{ const n=parseFloat(e.target.value); onChange(isNaN(n)?null:Math.min(max,Math.max(min,n))); }}
        style=${{colorScheme:'dark'}}
        className="w-28 text-center text-2xl font-black text-white border-b-2 border-gray-700 focus:border-blue-500 outline-none bg-transparent py-1"
      />
      <button onClick=${()=>onChange(Math.min(max,(value??goal)+step))}
        className="w-10 h-10 rounded-full bg-gray-800 border border-gray-700 text-gray-300 text-xl font-black hover:bg-gray-700 transition flex items-center justify-center"
      >+</button>
    </div>
  `;
}

// ── TodayView ─────────────────────────────────────────────
const fmtDate = s => new Date(s+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

function TodayView({log,onChange}) {
  const set = p => onChange({...log,...p});
  const score=dayScore(log);
  const calHit=log.calories!=null&&log.calories<=CG;
  const proHit=log.protein!=null&&log.protein>=PG;
  const calPct=log.calories!=null?Math.min(100,calScore(log.calories)):0;
  const proPct=log.protein!=null?Math.min(100,proScore(log.protein)):0;

  return html`
    <div className="space-y-4">
      <p className="text-center text-xs text-gray-600 uppercase tracking-widest font-semibold">${fmtDate(log.date)}</p>

      <div className="flex justify-center py-2">
        <${ScoreRing} score=${score}/>
      </div>

      <div className="bg-gray-900 border border-gray-800 rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <span className="text-xl">🏋️</span>
            <div>
              <div className="font-black text-white">Gym Today?</div>
              <div className="text-xs text-gray-600">Goal: 6 sessions / week</div>
            </div>
          </div>
          ${log.gym===true && html`<span className="text-xs font-black text-green-400 bg-green-400/10 border border-green-400/20 px-3 py-1 rounded-full">TRAINED ✓</span>`}
        </div>
        <div className="flex gap-3">
          <button onClick=${()=>set({gym:true})}
            className=${`flex-1 py-3 rounded-xl font-black text-sm transition ${log.gym===true?'bg-green-500 text-white':'bg-gray-800 text-gray-500 border border-gray-700 hover:bg-gray-700'}`}
          >I TRAINED 💪</button>
          <button onClick=${()=>set({gym:false})}
            className=${`flex-1 py-3 rounded-xl font-black text-sm transition ${log.gym===false?'bg-gray-700 text-gray-200 border border-gray-600':'bg-gray-800 text-gray-600 border border-gray-700 hover:bg-gray-700'}`}
          >REST DAY</button>
        </div>
      </div>

      <div className=${`bg-gray-900 rounded-2xl p-5 border transition ${calHit?'border-blue-500/40':'border-gray-800'}`}>
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <span className="text-xl">🔥</span>
            <div>
              <div className="font-black text-white">Calories</div>
              <div className="text-xs text-gray-600">Goal ≤ 2,200 kcal</div>
            </div>
          </div>
          ${calHit
            ? html`<span className="text-xs font-black text-blue-400 bg-blue-400/10 border border-blue-400/20 px-3 py-1 rounded-full">ON TRACK ✓</span>`
            : log.calories!=null && html`<span className="text-xs font-black text-orange-400 bg-orange-400/10 border border-orange-400/20 px-3 py-1 rounded-full">+${log.calories-CG} over</span>`
          }
        </div>
        <${NumInput} value=${log.calories} goal=${CG} step=${50} min=${500} max=${5000} onChange=${v=>set({calories:v})}/>
        ${log.calories!=null && html`
          <div className="mt-3 h-1.5 bg-gray-800 rounded-full overflow-hidden">
            <div className=${`h-full rounded-full transition-all duration-500 ${calHit?'bg-blue-500':'bg-orange-500'}`}
              style=${{width:`${calPct}%`,boxShadow:calHit?'0 0 8px #3b82f6':'0 0 6px #f97316'}}/>
          </div>
        `}
      </div>

      <div className=${`bg-gray-900 rounded-2xl p-5 border transition ${proHit?'border-blue-500/40':'border-gray-800'}`}>
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <span className="text-xl">🥩</span>
            <div>
              <div className="font-black text-white">Protein</div>
              <div className="text-xs text-gray-600">Goal ≥ 150g</div>
            </div>
          </div>
          ${proHit
            ? html`<span className="text-xs font-black text-blue-400 bg-blue-400/10 border border-blue-400/20 px-3 py-1 rounded-full">GOAL HIT ✓</span>`
            : log.protein!=null && html`<span className="text-xs font-black text-blue-400/60 px-3 py-1 rounded-full">${PG-log.protein}g to go</span>`
          }
        </div>
        <${NumInput} value=${log.protein} goal=${PG} step=${5} min=${0} max=${400} onChange=${v=>set({protein:v})}/>
        ${log.protein!=null && html`
          <div className="mt-3 h-1.5 bg-gray-800 rounded-full overflow-hidden">
            <div className=${`h-full rounded-full transition-all duration-500 ${proHit?'bg-blue-500':'bg-blue-400/50'}`}
              style=${{width:`${proPct}%`,boxShadow:proHit?'0 0 8px #3b82f6':undefined}}/>
          </div>
        `}
      </div>
    </div>
  `;
}

// ── Sparkline ─────────────────────────────────────────────
const SC={orange:'#f97316',blue:'#3b82f6',green:'#22c55e'};
function Sparkline({values,goal,direction,color}) {
  const W=300,H=60,stroke=SC[color]||'#3b82f6';
  const def=values.filter(v=>v!=null);
  if(def.length<2) return html`
    <div className="flex items-center justify-center rounded-xl bg-gray-800/50 border border-gray-800" style=${{height:H}}>
      <span className="text-xs text-gray-700 font-semibold uppercase tracking-wider">Log a few days to see trend</span>
    </div>
  `;
  const all=[...def,goal], minV=Math.min(...all)*.88, maxV=Math.max(...all)*1.12, rng=maxV-minV||1, n=values.length;
  const pt=(i,v)=>({x:(i/(n-1))*W,y:H-((v-minV)/rng)*H});
  const goalY=H-((goal-minV)/rng)*H;
  let d='',going=false;
  for(let i=0;i<n;i++){ const v=values[i]; if(v==null){going=false;continue;} const p=pt(i,v); d+=going?` L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`:`M ${p.x.toFixed(1)} ${p.y.toFixed(1)}`; going=true; }
  return html`
    <svg viewBox=${`0 0 ${W} ${H}`} className="w-full rounded-lg" style=${{height:H}} preserveAspectRatio="none">
      <line x1="0" y1=${goalY} x2=${W} y2=${goalY} stroke="#374151" strokeWidth="1.5" strokeDasharray="5 4"/>
      ${d&&html`<path d=${d} fill="none" stroke=${stroke} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style=${{filter:`drop-shadow(0 0 4px ${stroke})`}}/>`}
      ${values.map((v,i)=>v!=null&&html`<circle key=${i} cx=${pt(i,v).x} cy=${pt(i,v).y} r="4"
        fill=${direction==='up'?(v>=goal?'#22c55e':stroke):(v<=goal?'#22c55e':stroke)}
        style=${{filter:`drop-shadow(0 0 3px ${direction==='up'?(v>=goal?'#22c55e':stroke):(v<=goal?'#22c55e':stroke)})`}}
      />`)}
    </svg>
  `;
}

// ── TrendsView ────────────────────────────────────────────
const DAYS=['M','T','W','T','F','S','S'];
const avg = nums => { const d=nums.filter(v=>v!=null); return d.length?Math.round(d.reduce((a,b)=>a+b)/d.length):null; };
function Stat({label,value}) {
  return html`
    <div className="bg-gray-800 rounded-xl px-3 py-2 text-center flex-1">
      <div className="text-white font-black text-lg leading-none">${value}</div>
      <div className="text-gray-600 text-xs mt-1 uppercase tracking-wider font-semibold">${label}</div>
    </div>
  `;
}
function TrendsView({logs}) {
  const d14=last14(), wd=weekDays(), tod=today();
  const gym=wd.filter(d=>logs.find(l=>l.date===d)?.gym===true).length;
  const cal14=d14.map(d=>logs.find(l=>l.date===d)?.calories??null);
  const pro14=d14.map(d=>logs.find(l=>l.date===d)?.protein??null);
  const calAvg=avg(cal14), proAvg=avg(pro14);
  const calStr=streak(logs,l=>l.calories!=null&&l.calories<=CG);
  const proStr=streak(logs,l=>l.protein!=null&&l.protein>=PG);
  const gymStr=streak(logs,l=>l.gym===true);
  const calLg=cal14.filter(v=>v!=null).length, proLg=pro14.filter(v=>v!=null).length;
  const calHit=cal14.filter(v=>v!=null&&v<=CG).length, proHit=pro14.filter(v=>v!=null&&v>=PG).length;
  return html`
    <div className="space-y-4">
      <p className="text-xs text-gray-600 text-center uppercase tracking-widest font-semibold">Last 14 days</p>
      <div className="bg-gray-900 border border-gray-800 rounded-2xl p-5">
        <div className="flex items-center justify-between mb-5">
          <div className="flex items-center gap-2">
            <span className="text-xl">🏋️</span>
            <div>
              <div className="font-black text-white">Gym Sessions</div>
              <div className="text-xs text-gray-600">Goal: 6× per week</div>
            </div>
          </div>
          <div className="text-right">
            <div className=${`text-3xl font-black leading-none ${gym>=6?'text-green-400':'text-white'}`}>
              ${gym}<span className="text-gray-700 text-xl">/6</span>
            </div>
            ${gymStr>1&&html`<div className="text-xs text-orange-400 font-black mt-1">🔥 ${gymStr}d streak</div>`}
          </div>
        </div>
        <div className="flex gap-1.5">
          ${wd.map((d,i)=>{
            const l=logs.find(x=>x.date===d),went=l?.gym===true,rest=l?.gym===false,isTod=d===tod,fut=d>tod;
            return html`
              <div key=${d} className="flex-1 flex flex-col items-center gap-1.5">
                <span className="text-xs text-gray-600 font-bold">${DAYS[i]}</span>
                <div className=${`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black border-2 ${
                  went?'bg-green-500 border-green-500 text-white':
                  rest?'bg-gray-800 border-gray-700 text-gray-600':
                  isTod?'border-blue-500 border-dashed bg-blue-500/5 text-blue-500':
                  fut?'border-gray-800 bg-transparent':'border-gray-800 bg-gray-800/50'
                }`}>${went?'✓':rest?'–':''}</div>
              </div>
            `;
          })}
        </div>
      </div>
      <div className="bg-gray-900 border border-gray-800 rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <span className="text-xl">🔥</span>
            <div><div className="font-black text-white">Calories</div><div className="text-xs text-gray-600">Goal ≤ 2,200 kcal</div></div>
          </div>
          ${calStr>1&&html`<span className="text-xs font-black text-orange-400 bg-orange-400/10 border border-orange-400/20 px-3 py-1 rounded-full">🔥 ${calStr}d</span>`}
        </div>
        <div className="flex gap-2 mb-4">
          <${Stat} label="14d avg" value=${calAvg!=null?`${calAvg.toLocaleString()}`:'—'}/>
          <${Stat} label="goal" value="2,200"/>
          <${Stat} label="on track" value=${calLg?`${calHit}/${calLg}d`:'—'}/>
        </div>
        <${Sparkline} values=${cal14} goal=${CG} direction="down" color="orange"/>
      </div>
      <div className="bg-gray-900 border border-gray-800 rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-2">
            <span className="text-xl">🥩</span>
            <div><div className="font-black text-white">Protein</div><div className="text-xs text-gray-600">Goal ≥ 150g</div></div>
          </div>
          ${proStr>1&&html`<span className="text-xs font-black text-orange-400 bg-orange-400/10 border border-orange-400/20 px-3 py-1 rounded-full">🔥 ${proStr}d</span>`}
        </div>
        <div className="flex gap-2 mb-4">
          <${Stat} label="14d avg" value=${proAvg!=null?`${proAvg}g`:'—'}/>
          <${Stat} label="goal" value="150g"/>
          <${Stat} label="goal hit" value=${proLg?`${proHit}/${proLg}d`:'—'}/>
        </div>
        <${Sparkline} values=${pro14} goal=${PG} direction="up" color="blue"/>
      </div>
    </div>
  `;
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [logs,setLogs]=useState([]);
  const [tab,setTab]=useState('today');
  useEffect(()=>setLogs(loadLogs()),[]);
  const onChange = updated => { const next=upsert(logs,updated); setLogs(next); saveLogs(next); };
  return html`
    <div className="min-h-screen">
      <div className="max-w-lg mx-auto px-4 pb-12">
        <div className="pt-10 pb-5">
          <h1 className="text-3xl font-black text-white tracking-tight">My Performance</h1>
          <p className="text-xs text-gray-600 mt-1 uppercase tracking-widest font-semibold">Log · Track · Improve</p>
        </div>
        <div className="flex gap-1 mb-6 bg-gray-900 border border-gray-800 rounded-2xl p-1">
          ${['today','trends'].map(t=>html`
            <button key=${t} onClick=${()=>setTab(t)}
              className=${`flex-1 py-2.5 rounded-xl text-sm font-black tracking-wide transition-all ${t===tab?'bg-blue-600 text-white':'text-gray-600 hover:text-gray-400'}`}
            >${t==='today'?'📋 TODAY':'📈 TRENDS'}</button>
          `)}
        </div>
        ${tab==='today'
          ? html`<${TodayView} log=${getToday(logs)} onChange=${onChange}/>`
          : html`<${TrendsView} logs=${logs}/>`
        }
      </div>
    </div>
  `;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
