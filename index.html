<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leyvix OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background:#09090b; color:#fafafa; font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#3f3f46; border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background:#52525b; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
    input::placeholder, textarea::placeholder { color:#71717a; }
    button { font-family:'Inter',sans-serif; cursor:pointer; }
    button:hover { opacity:0.85; }
    textarea { font-family:'Inter',sans-serif; color:#fafafa; }
    select option { background:#18181b; color:#fafafa; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.6); cursor:pointer; }
  </style>
</head>
