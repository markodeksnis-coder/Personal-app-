<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #05050a; color: #f1f5f9; overflow: hidden; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.4); border-radius: 2px; }
    @keyframes slide-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glow-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes bar-in { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes count-in { from { opacity: 0; transform: scale(0.88) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .anim-up { animation: slide-up 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-count { animation: count-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
    .glow-pulse { animation: glow-pulse 3s ease-in-out infinite; }
    .card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: border-color 0.2s ease, background 0.2s ease; }
    .card:hover { border-color: rgba(139,92,246,0.2); background: rgba(255,255,255,0.04); }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 9px; cursor: pointer; color: #475569; font-size: 13px; font-weight: 500; transition: all 0.15s ease; border: 1px solid transparent; user-select: none; }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: #94a3b8; }
    .nav-active { background: rgba(139,92,246,0.12) !important; color: #a78bfa !important; border-color: rgba(139,92,246,0.2) !important; }
    .progress-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transform-origin: left; animation: bar-in 1s cubic-bezier(0.4,0,0.2,1) both; }
    .task-card { border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s ease; background: rgba(255,255,255,0.02); }
    .task-card:hover { border-color: rgba(139,92,246,0.25); background: rgba(139,92,246,0.04); }
    .task-done { border-color: rgba(16,185,129,0.3) !important; background: rgba(16,185,129,0.04) !important; }
    .streak-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(239,68,68,0.12)); border: 1px solid rgba(245,158,11,0.25); color: #fbbf24; }
    .insight-item { padding: 9px 12px; border-radius: 9px; background: rgba(255,255,255,0.02); border-left: 2px solid; font-size: 11.5px; line-height: 1.5; color: #94a3b8; animation: slide-up 0.4s ease both; }
    .btn-sm { width: 26px; height: 26px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: #64748b; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; transition: all 0.15s ease; }
    .btn-sm:hover { border-color: rgba(139,92,246,0.3); color: #a78bfa; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React, { useState, useEffect } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm';
const html = htm.bind(React.createElement);

const KEY='perf-os-v1', GKEY='perf-goals-v1';
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>ds(new Date());
const loadLogs=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch{return[];}};
const saveLogs=l=>localStorage.setItem(KEY,JSON.stringify(l.slice(-120)));
const DG={calories:2200,protein:150,sleep:7.5,steps:10000,gymPerWeek:6,water:3};
const loadGoals=()=>{try{return{...DG,...JSON.parse(localStorage.getItem(GKEY)||'{}')};}catch{return DG;}};
const saveGoals=g=>localStorage.setItem(GKEY,JSON.stringify(g));
const getTodayLog=logs=>logs.find(l=>l.date===today())||{date:today(),gym:null,calories:null,protein:null,sleep:null,steps:null,energy:null,morningRoutine:null,reading:null,water:null};
const upsert=(logs,log)=>{const i=logs.findIndex(l=>l.date===log.date),n=[...logs];i>=0?n[i]=log:n.push(log);return n.sort((a,b)=>a.date.localeCompare(b.date));};
const lastN=(logs,n)=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return ds(d);}).map(dt=>logs.find(l=>l.date===dt)||null);
const streakFn=(logs,fn)=>{let s=0;const d=new Date();for(let i=0;i<90;i++){const l=logs.find(x=>x.date===ds(d));if(l&&fn(l))s++;else break;d.setDate(d.getDate()-1);}return s;};

const sCAL=(v,g)=>v<=g?100:Math.max(0,Math.round(((g*1.5-v)/(g*0.5))*100));
const sPRO=(v,g)=>Math.min(100,Math.round((v/g)*100));
const sSLP=(v,g)=>Math.max(0,Math.round((1-Math.abs(v-g)/g)*100));
const sSTP=(v,g)=>Math.min(100,Math.round((v/g)*100));
const calcScore=(log,goals)=>{
  if(!log)return null;
  const s=[];
  if(log.gym!==null)s.push(log.gym?100:20);
  if(log.calories!=null)s.push(sCAL(log.calories,goals.calories));
  if(log.protein!=null)s.push(sPRO(log.protein,goals.protein));
  if(log.sleep!=null)s.push(sSLP(log.sleep,goals.sleep));
  if(log.steps!=null)s.push(sSTP(log.steps,goals.steps));
  if(log.energy!=null)s.push(log.energy*10);
  if(log.morningRoutine!==null)s.push(log.morningRoutine?100:20);
  if(log.reading!==null)s.push(log.reading?100:50);
  if(log.water!=null)s.push(Math.min(100,Math.round((log.water/goals.water)*100)));
  return s.length?Math.round(s.reduce((a,b)=>a+b)/s.length):null;
};
const SC=s=>s>=80?'#10b981':s>=60?'#8b5cf6':s>=40?'#f59e0b':'#ef4444';
const SL=s=>s>=80?'OPTIMAL':s>=60?'PERFORMING':s>=40?'SUBOPTIMAL':'CRITICAL';
const SG=s=>s>=80?'rgba(16,185,129,0.35)':s>=60?'rgba(139,92,246,0.35)':s>=40?'rgba(245,158,11,0.25)':'rgba(239,68,68,0.25)';

function genInsights(logs,goals){
  const ins=[],r=lastN(logs,14),tod=logs.find(l=>l.date===today());
  const slpD=r.filter(l=>l?.sleep!=null);
  if(slpD.length>=3){const avg=slpD.reduce((a,l)=>a+l.sleep,0)/slpD.length;
    if(avg<goals.sleep-0.5)ins.push({t:'warning',m:`Avg sleep ${avg.toFixed(1)}h ‚Äî ${(goals.sleep-avg).toFixed(1)}h below target`});
    else ins.push({t:'good',m:`Sleep avg ${avg.toFixed(1)}h ‚Äî consistent with target`});}
  const gymD=r.filter(l=>l?.gym===true).length;
  if(gymD>=8)ins.push({t:'good',m:`${gymD}/14 training days ‚Äî elite consistency`});
  else if(gymD<=4&&r.filter(l=>l!==null).length>=7)ins.push({t:'bad',m:`${gymD}/14 training days ‚Äî below target`});
  const calD=r.filter(l=>l?.calories!=null);
  if(calD.length>=5){const hit=calD.filter(l=>l.calories<=goals.calories).length;
    if(hit/calD.length>=0.8)ins.push({t:'good',m:`Calorie control ${Math.round(hit/calD.length*100)}% ‚Äî strong discipline`});
    else ins.push({t:'warning',m:`Calorie target missed ${calD.length-hit}/${calD.length} days`});}
  if(tod?.energy>=8)ins.push({t:'info',m:`Energy ${tod.energy}/10 today ‚Äî capitalize now`});
  else if(tod?.energy!=null&&tod.energy<=4)ins.push({t:'warning',m:'Low energy ‚Äî prioritize recovery today'});
  const proBad=r.filter(l=>l?.protein!=null&&l.protein<goals.protein*0.8);
  if(proBad.length>=4)ins.push({t:'warning',m:'Protein under 80% target ‚Äî impacts recovery'});
  if(!ins.length)ins.push({t:'info',m:'Log daily metrics to unlock AI insights'});
  return ins.slice(0,4);
}

function StatusRing({score,size=220}){
  const [on,setOn]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setOn(true),200);return()=>clearTimeout(t);},[]);
  const r=size/2-16,circ=2*Math.PI*r;
  const off=on&&score!=null?circ*(1-score/100):circ;
  const col=score!=null?SC(score):'#1e293b';
  const glow=score!=null?SG(score):'transparent';
  return html`
    <div style=${{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <div class="glow-pulse" style=${{position:'absolute',inset:-28,borderRadius:'50%',background:`radial-gradient(circle, ${glow} 0%, transparent 60%)`}}></div>
      <svg width=${size} height=${size} style=${{transform:'rotate(-90deg)',position:'absolute',zIndex:1}}>
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="12"/>
        ${score!=null&&html`<circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${col} strokeWidth="12"
          strokeLinecap="round"
          strokeDasharray="${circ} ${circ}"
          strokeDashoffset=${off}
          style=${{transition:'stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1)',filter:`drop-shadow(0 0 16px ${col}) drop-shadow(0 0 32px ${col}66)`}}/>`}
        ${Array.from({length:32},(_,i)=>{const a=(i/32)*2*Math.PI,ri=r-20,ro=r-14;
          const x1=(size/2+Math.cos(a)*ri).toFixed(1),y1=(size/2+Math.sin(a)*ri).toFixed(1);
          const x2=(size/2+Math.cos(a)*ro).toFixed(1),y2=(size/2+Math.sin(a)*ro).toFixed(1);
          return html`<line key=${i} x1=${x1} y1=${y1} x2=${x2} y2=${y2} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>`;})}
      </svg>
      <div style=${{position:'absolute',textAlign:'center',zIndex:2}}>
        <div style=${{fontSize:9,color:'#334155',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.2em',marginBottom:6}}>SYSTEM STATUS</div>
        <div class="anim-count" style=${{fontSize:score!=null?50:30,fontWeight:900,letterSpacing:'-2px',lineHeight:1,
          color:score!=null?col:'#1e293b',textShadow:score!=null?`0 0 30px ${col}88`:'none'}}>
          ${score!=null?score:'‚Äî'}
        </div>
        ${score!=null&&html`<div style=${{fontSize:9,fontWeight:700,letterSpacing:'0.15em',color:col,marginTop:8,textTransform:'uppercase'}}>${SL(score)}</div>`}
      </div>
    </div>`;
}

function Chart({data,color='#8b5cf6',h=80}){
  const W=300,vals=data.map(d=>d?.score??null),filled=vals.filter(v=>v!=null);
  if(filled.length<2)return html`<div style=${{height:h,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#334155',fontStyle:'italic'}}>Log more days to see trend</div>`;
  const lo=Math.max(0,Math.min(...filled)-8),hi=Math.min(100,Math.max(...filled)+8),rng=hi-lo||10,n=vals.length;
  const px=(i,v)=>({x:(i/(n-1))*W,y:h-((v-lo)/rng)*(h*0.88)-h*0.06});
  let path='',area='',go=false;const pts=[];
  for(let i=0;i<n;i++){const v=vals[i];if(v==null){go=false;continue;}const p=px(i,v);pts.push({...p,v});
    if(!go){path+=`M${p.x.toFixed(1)} ${p.y.toFixed(1)}`;area+=`M${p.x.toFixed(1)} ${h}`;go=true;}
    else path+=` L${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    area+=` L${p.x.toFixed(1)} ${p.y.toFixed(1)}`;}
  if(pts.length)area+=` L${pts[pts.length-1].x.toFixed(1)} ${h} Z`;
  const gid=`g${color.replace('#','')}`;
  return html`
    <svg viewBox="0 0 ${W} ${h}" width="100%" height=${h} preserveAspectRatio="none" style=${{overflow:'visible'}}>
      <defs><linearGradient id=${gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor=${color} stopOpacity="0.28"/>
        <stop offset="100%" stopColor=${color} stopOpacity="0"/>
      </linearGradient></defs>
      ${area&&html`<path d=${area} fill="url(#${gid})"/>`}
      ${path&&html`<path d=${path} fill="none" stroke=${color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style=${{filter:`drop-shadow(0 0 5px ${color})`}}/>`}
      ${pts.map(({x,y},i)=>html`<circle key=${i} cx=${x.toFixed(1)} cy=${y.toFixed(1)} r="3.5" fill=${color} style=${{filter:`drop-shadow(0 0 4px ${color})`}}/>`)}
    </svg>`;
}

function Task({icon,label,sub,done,onToggle}){
  return html`
    <div class=${`task-card${done?' task-done':''}`} onClick=${onToggle}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style=${{display:'flex',alignItems:'center',gap:10}}>
          <div style=${{width:36,height:36,borderRadius:10,
            background:done?'rgba(16,185,129,0.15)':'rgba(255,255,255,0.05)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,
            boxShadow:done?'0 0 14px rgba(16,185,129,0.35)':undefined,transition:'all 0.2s'}}>${icon}</div>
          <div>
            <div style=${{fontSize:13,fontWeight:600,color:done?'#10b981':'#e2e8f0',transition:'color 0.2s'}}>${label}</div>
            ${sub&&html`<div style=${{fontSize:10,color:'#475569',marginTop:1}}>${sub}</div>`}
          </div>
        </div>
        <div style=${{width:22,height:22,borderRadius:'50%',
          border:`2px solid ${done?'#10b981':'rgba(255,255,255,0.1)'}`,
          background:done?'#10b981':'transparent',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:11,color:'white',fontWeight:800,transition:'all 0.25s',
          boxShadow:done?'0 0 10px rgba(16,185,129,0.5)':undefined}}>${done?'‚úì':''}</div>
      </div>
    </div>`;
}

function Metric({icon,label,val,goal,unit,color,step,min,max,inv,onChange}){
  const pct=goal&&val!=null?Math.min(100,Math.round((val/goal)*100)):null;
  const hit=inv?(val!=null&&val<=goal):(pct!=null&&pct>=100);
  const c=hit?'#10b981':color;
  return html`
    <div class="card" style=${{padding:'14px'}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style=${{display:'flex',alignItems:'center',gap:6}}>
          <span style=${{fontSize:14}}>${icon}</span>
          <span style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.08em'}}>${label}</span>
        </div>
        ${hit&&html`<div style=${{width:7,height:7,borderRadius:'50%',background:'#10b981',boxShadow:'0 0 8px #10b98177'}}></div>`}
      </div>
      <div style=${{display:'flex',alignItems:'baseline',gap:3,marginBottom:8}}>
        <span style=${{fontSize:24,fontWeight:800,letterSpacing:'-0.5px',color:val!=null?c:'#1e293b'}}>${val??'‚Äî'}</span>
        ${unit&&html`<span style=${{fontSize:11,color:'#475569',marginLeft:1}}>${unit}</span>`}
        ${goal&&val!=null&&html`<span style=${{fontSize:10,color:'#334155',marginLeft:4}}>/ ${goal}</span>`}
      </div>
      <div style=${{display:'flex',alignItems:'center',gap:7}}>
        <button class="btn-sm" onClick=${()=>onChange(Math.max(min,(val??goal)-step))}>‚àí</button>
        <div class="progress-track" style=${{flex:1}}>
          <div class="progress-fill" style=${{width:`${pct||0}%`,background:c,boxShadow:`0 0 6px ${c}55`}}></div>
        </div>
        <button class="btn-sm" onClick=${()=>onChange(Math.min(max,(val??goal)+step))}>+</button>
      </div>
    </div>`;
}

function Energy({val,onChange}){
  return html`
    <div class="card" style=${{padding:'14px'}}>
      <div style=${{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
        <span style=${{fontSize:14}}>‚ö°</span>
        <span style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.08em'}}>Energy</span>
      </div>
      <div style=${{fontSize:24,fontWeight:800,letterSpacing:'-0.5px',marginBottom:10,
        color:val!=null?(val>=7?'#10b981':val>=4?'#f59e0b':'#ef4444'):'#1e293b'}}>
        ${val!=null?`${val}/10`:'‚Äî'}
      </div>
      <div style=${{display:'flex',gap:3}}>
        ${Array.from({length:10},(_,i)=>html`
          <div key=${i} onClick=${()=>onChange(i+1)}
            style=${{flex:1,height:18,borderRadius:3,cursor:'pointer',transition:'all 0.15s',
              background:val!=null&&i<val?(i<3?'#ef4444':i<6?'#f59e0b':'#10b981'):'rgba(255,255,255,0.05)',
              boxShadow:val!=null&&i<val?`0 0 5px ${i<3?'#ef4444':i<6?'#f59e0b':'#10b981'}`:undefined}}></div>`)}
      </div>
    </div>`;
}

function Sidebar({page,setPage,score}){
  const col=score!=null?SC(score):'#8b5cf6';
  const nav=[
    {id:'dashboard',label:'Dashboard',icon:'‚ñ¶'},
    {id:'analytics',label:'Analytics',icon:'‚Üó'},
    {id:'reviews',label:'Reviews',icon:'‚óà'},
    {id:'goals',label:'Goals',icon:'‚óé'},
    {id:'settings',label:'Settings',icon:'‚öô'},
  ];
  return html`
    <div style=${{width:220,background:'rgba(0,0,0,0.5)',borderRight:'1px solid rgba(255,255,255,0.05)',
      display:'flex',flexDirection:'column',flexShrink:0,backdropFilter:'blur(20px)'}}>
      <div style=${{padding:'20px 18px 14px',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
        <div style=${{display:'flex',alignItems:'center',gap:10}}>
          <div style=${{width:34,height:34,borderRadius:10,
            background:'linear-gradient(135deg, #8b5cf6 0%, #06b6d4 100%)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,
            boxShadow:'0 4px 16px rgba(139,92,246,0.5)'}}>‚ö°</div>
          <div>
            <div style=${{fontSize:14,fontWeight:800,letterSpacing:'-0.3px'}}>Performance</div>
            <div style=${{fontSize:9,color:'#475569',fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase'}}>OS</div>
          </div>
        </div>
      </div>
      <div style=${{padding:'12px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
        <div style=${{background:'rgba(255,255,255,0.02)',borderRadius:10,padding:'10px 12px',border:`1px solid ${col}33`}}>
          <div style=${{fontSize:9,color:'#334155',textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:4}}>System Status</div>
          <div style=${{fontSize:26,fontWeight:900,letterSpacing:'-1px',color:col,textShadow:`0 0 20px ${col}66`}}>
            ${score!=null?`${score}%`:'‚Äî'}
          </div>
        </div>
      </div>
      <nav style=${{padding:'10px',flex:1}}>
        ${nav.map(({id,label,icon})=>html`
          <div key=${id} class=${`nav-item${page===id?' nav-active':''}`} onClick=${()=>setPage(id)}>
            <span style=${{fontSize:15,lineHeight:1}}>${icon}</span>
            <span>${label}</span>
          </div>`)}
      </nav>
      <div style=${{padding:'14px 18px',borderTop:'1px solid rgba(255,255,255,0.04)'}}>
        <div style=${{fontSize:9,color:'#1e293b',textAlign:'center',letterSpacing:'0.1em',textTransform:'uppercase'}}>Performance OS v2.0</div>
      </div>
    </div>`;
}

function Dashboard({logs,goals,onChange}){
  const log=getTodayLog(logs),score=calcScore(log,goals);
  const last7=lastN(logs,7).map(l=>({score:calcScore(l,goals)}));
  const gymStreak=streakFn(logs,l=>l.gym===true);
  const insights=genInsights(logs,goals);
  const set=p=>onChange({...log,...p});
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const fmtD=()=>new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const IC={warning:'#f59e0b',good:'#10b981',bad:'#ef4444',info:'#06b6d4'};
  return html`
    <div style=${{padding:'22px 26px',height:'100%',overflowY:'auto'}}>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 240px 1fr',gap:20,marginBottom:20,alignItems:'start'}}>
        <div class="anim-up" style=${{animationDelay:'0ms'}}>
          <div style=${{fontSize:10,color:'#334155',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:6}}>${fmtD()}</div>
          <div style=${{fontSize:22,fontWeight:800,letterSpacing:'-0.5px',marginBottom:14}}>${greet}</div>
          <div style=${{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            ${gymStreak>0&&html`<div class="streak-badge">üî• ${gymStreak}-day streak</div>`}
            ${score!=null&&html`<div style=${{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:'rgba(139,92,246,0.1)',border:'1px solid rgba(139,92,246,0.2)',color:'#a78bfa'}}>${SL(score)}</div>`}
          </div>

function Analytics({logs,goals}){
  const r30=lastN(logs,30),r14=lastN(logs,14);
  const sets=[
    {label:'System Status',data:r30.map(l=>({score:calcScore(l,goals)})),color:'#8b5cf6'},
    {label:'Calorie Control',data:r30.map(l=>({score:l?.calories!=null?sCAL(l.calories,goals.calories):null})),color:'#f59e0b'},
    {label:'Protein',data:r30.map(l=>({score:l?.protein!=null?sPRO(l.protein,goals.protein):null})),color:'#a78bfa'},
    {label:'Sleep',data:r30.map(l=>({score:l?.sleep!=null?sSLP(l.sleep,goals.sleep):null})),color:'#06b6d4'},
  ];
  const habits=[
    {label:'Gym',fn:l=>l?.gym===true,color:'#10b981'},
    {label:'Morning Routine',fn:l=>l?.morningRoutine===true,color:'#8b5cf6'},
    {label:'Reading',fn:l=>l?.reading===true,color:'#06b6d4'},
    {label:'Calories on Target',fn:l=>l?.calories!=null&&l.calories<=goals.calories,color:'#f59e0b'},
    {label:'Protein Goal',fn:l=>l?.protein!=null&&l.protein>=goals.protein,color:'#a78bfa'},
  ];
  return html`
    <div style=${{padding:'22px 26px',height:'100%',overflowY:'auto'}}>
      <div style=${{marginBottom:20}}><div style=${{fontSize:20,fontWeight:800,letterSpacing:'-0.3px',marginBottom:3}}>Analytics</div><div style=${{fontSize:12,color:'#475569'}}>30-day performance analysis</div></div>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        ${sets.map(({label,data,color})=>html`
          <div key=${label} class="card" style=${{padding:'16px'}}>
            <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.1em'}}>${label}</span>
              <div style=${{width:7,height:7,borderRadius:'50%',background:color,boxShadow:`0 0 7px ${color}`}}></div>
            </div>
            <${Chart} data=${data} color=${color} h=${90}/>
          </div>`)}
      </div>
      <div class="card" style=${{padding:'18px'}}>
        <div style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:14}}>14-Day Habit Consistency</div>
        ${habits.map(({label,fn,color})=>{
          const tot=r14.filter(l=>l!=null).length,hits=r14.filter(l=>l&&fn(l)).length,pct=tot?Math.round((hits/tot)*100):0;
          return html`
            <div key=${label} style=${{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
              <div style=${{width:124,fontSize:12,color:'#94a3b8',fontWeight:500,flexShrink:0}}>${label}</div>
              <div class="progress-track" style=${{flex:1}}><div class="progress-fill" style=${{width:`${pct}%`,background:color,boxShadow:`0 0 4px ${color}55`}}></div></div>
              <div style=${{width:34,textAlign:'right',fontSize:11,fontWeight:700,color,flexShrink:0}}>${pct}%</div>
            </div>`;})}
      </div>
    </div>`;
}

function Reviews({logs,goals}){
  const tw=lastN(logs,7);
  const lw=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(14-i));return ds(d);}).map(dt=>logs.find(l=>l.date===dt)||null);
  const avg=arr=>{const s=arr.map(l=>calcScore(l,goals)).filter(s=>s!=null);return s.length?Math.round(s.reduce((a,b)=>a+b)/s.length):null;};
  const ta=avg(tw),la=avg(lw),diff=ta!=null&&la!=null?ta-la:null;
  const logged=tw.filter(l=>l!=null).length,gym=tw.filter(l=>l?.gym===true).length;
  const calHit=tw.filter(l=>l?.calories!=null&&l.calories<=goals.calories).length;
  const proHit=tw.filter(l=>l?.protein!=null&&l.protein>=goals.protein).length;
  return html`
    <div style=${{padding:'22px 26px',height:'100%',overflowY:'auto'}}>
      <div style=${{marginBottom:20}}><div style=${{fontSize:20,fontWeight:800,letterSpacing:'-0.3px',marginBottom:3}}>Weekly Review</div><div style=${{fontSize:12,color:'#475569'}}>Performance debrief</div></div>
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        <div class="card" style=${{padding:'20px',textAlign:'center'}}>
          <div style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>This Week Avg</div>
          <div style=${{fontSize:46,fontWeight:900,letterSpacing:'-2px',color:ta!=null?SC(ta):'#1e293b'}}>${ta??'‚Äî'}</div>
          ${ta!=null&&html`<div style=${{fontSize:10,fontWeight:700,color:SC(ta),letterSpacing:'0.1em',marginTop:4}}>${SL(ta)}</div>`}
        </div>
        <div class="card" style=${{padding:'20px',textAlign:'center'}}>
          <div style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:8}}>vs Last Week</div>
          <div style=${{fontSize:46,fontWeight:900,letterSpacing:'-2px',color:la!=null?SC(la):'#1e293b'}}>${la??'‚Äî'}</div>
          ${diff!=null&&html`<div style=${{fontSize:14,fontWeight:700,color:diff>=0?'#10b981':'#ef4444',marginTop:4}}>${diff>=0?'‚Üë':'‚Üì'} ${Math.abs(diff)} pts</div>`}
        </div>
      </div>
      <div class="card" style=${{padding:'18px'}}>
        <div style=${{fontSize:10,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:16}}>This Week Breakdown</div>
        ${[{label:'Gym Sessions',val:gym,max:7,color:'#10b981'},{label:'Calories on Target',val:calHit,max:logged||7,color:'#f59e0b'},{label:'Protein Goal Hit',val:proHit,max:logged||7,color:'#8b5cf6'},{label:'Days Logged',val:logged,max:7,color:'#06b6d4'}].map(({label,val,max,color})=>html`
          <div key=${label} style=${{marginBottom:14}}>
            <div style=${{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style=${{fontSize:12,color:'#94a3b8',fontWeight:500}}>${label}</span><span style=${{fontSize:12,fontWeight:700,color}}>${val}/${max}</span></div>
            <div class="progress-track"><div class="progress-fill" style=${{width:`${max?Math.round((val/max)*100):0}%`,background:color,boxShadow:`0 0 4px ${color}55`}}></div></div>
          </div>`)}
      </div>
    </div>`;
}

function Goals({goals,onSave}){
  const [d,setD]=useState(goals),[ok,setOk]=useState(false);
  const save=()=>{onSave(d);setOk(true);setTimeout(()=>setOk(false),2000);};
  const fields=[
    {k:'calories',l:'Calorie Target',u:'kcal',icon:'üî•',s:50,min:1000,max:5000},
    {k:'protein',l:'Protein Target',u:'g',icon:'ü•©',s:5,min:50,max:300},
    {k:'sleep',l:'Sleep Target',u:'h',icon:'üò¥',s:0.5,min:4,max:12},
    {k:'steps',l:'Steps Target',u:'',icon:'üëü',s:500,min:1000,max:30000},
    {k:'gymPerWeek',l:'Gym Per Week',u:'x/wk',icon:'üèãÔ∏è',s:1,min:1,max:7},
    {k:'water',l:'Water Target',u:'L',icon:'üíß',s:0.25,min:1,max:6},
  ];
  return html`
    <div style=${{padding:'22px 26px',height:'100%',overflowY:'auto'}}>
      <div style=${{marginBottom:20}}><div style=${{fontSize:20,fontWeight:800,letterSpacing:'-0.3px',marginBottom:3}}>Goals</div><div style=${{fontSize:12,color:'#475569'}}>Set your performance targets</div></div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:12,marginBottom:20}}>
        ${fields.map(({k,l,u,icon,s,min,max})=>html`
          <div key=${k} class="card" style=${{padding:'16px'}}>
            <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:12}}><span style=${{fontSize:16}}>${icon}</span><span style=${{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>${l}</span></div>
            <div style=${{display:'flex',alignItems:'center',gap:8}}>
              <button class="btn-sm" onClick=${()=>setD(p=>({...p,[k]:Math.max(min,p[k]-s)}))}>‚àí</button>
              <input type="number" value=${d[k]} onChange=${e=>{const n=parseFloat(e.target.value);if(!isNaN(n))setD(p=>({...p,[k]:Math.min(max,Math.max(min,n))}));}}
                style=${{flex:1,textAlign:'center',fontSize:20,fontWeight:800,color:'#f1f5f9',background:'transparent',border:'none',borderBottom:'2px solid rgba(255,255,255,0.07)',outline:'none',padding:'4px 0',colorScheme:'dark'}}/>
              <span style=${{fontSize:11,color:'#475569',minWidth:28}}>${u}</span>
              <button class="btn-sm" onClick=${()=>setD(p=>({...p,[k]:Math.min(max,p[k]+s)}))}>+</button>
            </div>
          </div>`)}
      </div>
      <button onClick=${save} style=${{padding:'11px 28px',borderRadius:9,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,background:ok?'rgba(16,185,129,0.2)':'linear-gradient(135deg,#8b5cf6,#06b6d4)',color:ok?'#10b981':'white',boxShadow:ok?'0 0 20px rgba(16,185,129,0.2)':'0 4px 18px rgba(139,92,246,0.35)',transition:'all 0.3s ease'}}>
        ${ok?'‚úì Saved':'Save Targets'}
      </button>
    </div>`;
}

      <div style=${{marginBottom:20}}><div style=${{fontSize:20,fontWeight:800,letterSpacing:'-0.3px',marginBottom:3}}>Settings</div><div style=${{fontSize:12,color:'#475569'}}>Configuration</div></div>

}

function App(){
  const [logs,setLogs]=useState([]),[goals,setGoals]=useState(DG),[page,setPage]=useState('dashboard');
  useEffect(()=>{setLogs(loadLogs());setGoals(loadGoals());},[]);
  const onChange=up=>{const n=upsert(logs,up);setLogs(n);saveLogs(n);};
  const onSave=g=>{setGoals(g);saveGoals(g);};
  const score=calcScore(getTodayLog(logs),goals);
  const bg=score!=null?`radial-gradient(ellipse 80% 35% at 50% -5%, ${SG(score)} 0%, transparent 50%)`:'radial-gradient(ellipse 80% 35% at 50% -5%, rgba(139,92,246,0.1) 0%, transparent 50%)';
  return html`
    <div style=${{display:'flex',height:'100vh',background:'#05050a',backgroundImage:bg,overflow:'hidden'}}>
      <${Sidebar} page=${page} setPage=${setPage} score=${score}/>
      <main style=${{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        ${page==='dashboard'&&html`<${Dashboard} logs=${logs} goals=${goals} onChange=${onChange}/>`}
        ${page==='analytics'&&html`<${Analytics} logs=${logs} goals=${goals}/>`}
        ${page==='reviews'&&html`<${Reviews} logs=${logs} goals=${goals}/>`}
        ${page==='goals'&&html`<${Goals} goals=${goals} onSave=${onSave}/>`}
        ${page==='settings'&&html`<${SettingsPage}/>`}
      </main>
    </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
