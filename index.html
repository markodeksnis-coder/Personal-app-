<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#05050a;color:#f1f5f9;overflow:hidden}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(139,92,246,.5);border-radius:2px}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    @keyframes bar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes pop{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .au{animation:up .45s cubic-bezier(.16,1,.3,1) both}
    .ac{animation:pop .7s cubic-bezier(.34,1.56,.64,1) both}
    .gp{animation:pulse 3s ease-in-out infinite}
    .fi{animation:fadein .2s ease both}
    .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);border-radius:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:border-color .2s,background .2s}
    .card:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.045)}
    .nav{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:9px;cursor:pointer;color:#475569;font-size:13px;font-weight:600;transition:all .15s;border:1px solid transparent;user-select:none}
    .nav:hover{background:rgba(255,255,255,.05);color:#94a3b8}
    .active{background:rgba(139,92,246,.15)!important;color:#c4b5fd!important;border-color:rgba(139,92,246,.3)!important}
    .trk{height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
    .fil{height:100%;border-radius:4px;transform-origin:left;animation:bar 1s cubic-bezier(.4,0,.2,1) both}
    .bsm{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#64748b;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .15s;flex-shrink:0}
    .bsm:hover{border-color:rgba(139,92,246,.4);color:#c4b5fd;background:rgba(139,92,246,.1)}
    .tag{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.02em}
    .inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;color:#f1f5f9;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;width:100%;font-family:inherit}
    .inp:focus{border-color:rgba(139,92,246,.5);box-shadow:0 0 0 2px rgba(139,92,246,.1)}
    .inp option{background:#0d0d1a}
    .btnp{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;box-shadow:0 4px 20px rgba(139,92,246,.45);transition:all .2s;font-family:inherit}
    .btnp:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(139,92,246,.6)}
    .btnd{padding:9px 16px;border-radius:8px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.06);color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
    .btnd:hover{background:rgba(239,68,68,.15)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadein .15s ease}
    .modal{background:#0b0b18;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:28px;width:440px;max-width:92vw;max-height:90vh;overflow-y:auto}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React,{useState,useEffect} from 'https://esm.sh/react@18';
import{createRoot} from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm';
const html=htm.bind(React.createElement);

const LK='perf-os-v1',TK='perf-tgts-v1',GK='perf-goals-v3',SK='perf-set-v1';
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>ds(new Date());
const ld=k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

const DT={calories:2200,protein:150,sleep:7.5,steps:10000,gymPerWeek:6,water:3,weight:85};
const DS={units:'metric',weekStart:'mon'};
const DG=[
  {id:'g1',title:'Get Visible Abs',cat:'body',icon:'ЁЯФе',color:'#f97316',current:18,target:10,start:22,unit:'% body fat',dir:'down',deadline:''},
  {id:'g2',title:'Bench Press 100kg',cat:'strength',icon:'ЁЯТк',color:'#8b5cf6',current:70,target:100,start:60,unit:'kg',dir:'up',deadline:''},
  {id:'g3',title:'Run 5km Non-Stop',cat:'endurance',icon:'ЁЯПГ',color:'#10b981',current:2,target:5,start:0,unit:'km',dir:'up',deadline:''},
  {id:'g4',title:'Cut to 82kg',cat:'body',icon:'тЪЦя╕П',color:'#06b6d4',current:90,target:82,start:95,unit:'kg',dir:'down',deadline:'',linkedMetric:'weight'},
];

const loadLogs=()=>ld(LK)||[];
const saveLogs=l=>sv(LK,l.slice(-120));
const getTodayLog=logs=>logs.find(l=>l.date===today())||{date:today(),gym:null,calories:null,protein:null,sleep:null,steps:null,energy:null,morningRoutine:null,reading:null,water:null,weight:null};
const upsert=(logs,log)=>{const i=logs.findIndex(l=>l.date===log.date),n=[...logs];i>=0?n[i]=log:n.push(log);return n.sort((a,b)=>a.date.localeCompare(b.date));};
const lastN=(logs,n)=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return ds(d);}).map(dt=>logs.find(l=>l.date===dt)||null);
const streakFn=(logs,fn)=>{let s=0;const d=new Date();for(let i=0;i<90;i++){const l=logs.find(x=>x.date===ds(d));if(l&&fn(l))s++;else break;d.setDate(d.getDate()-1);}return s;};

const sCAL=(v,g)=>v<=g?100:Math.max(0,Math.round(((g*1.5-v)/(g*.5))*100));
const sPRO=(v,g)=>Math.min(100,Math.round((v/g)*100));
const sSLP=(v,g)=>Math.max(0,Math.round((1-Math.abs(v-g)/g)*100));
const sSTP=(v,g)=>Math.min(100,Math.round((v/g)*100));
const calcScore=(log,t)=>{
  if(!log)return null;
  const s=[];
  if(log.gym!==null)s.push(log.gym?100:20);
  if(log.calories!=null)s.push(sCAL(log.calories,t.calories));
  if(log.protein!=null)s.push(sPRO(log.protein,t.protein));
  if(log.sleep!=null)s.push(sSLP(log.sleep,t.sleep));
  if(log.steps!=null)s.push(sSTP(log.steps,t.steps));
  if(log.energy!=null)s.push(log.energy*10);
  if(log.morningRoutine!==null)s.push(log.morningRoutine?100:20);
  if(log.reading!==null)s.push(log.reading?100:50);
  if(log.water!=null)s.push(Math.min(100,Math.round((log.water/t.water)*100)));
  return s.length?Math.round(s.reduce((a,b)=>a+b)/s.length):null;
};
const SC=s=>s>=80?'#10b981':s>=60?'#8b5cf6':s>=40?'#f59e0b':'#ef4444';
const SL=s=>s>=80?'OPTIMAL':s>=60?'PERFORMING':s>=40?'SUBOPTIMAL':'CRITICAL';
const SG=s=>s>=80?'rgba(16,185,129,.45)':s>=60?'rgba(139,92,246,.45)':s>=40?'rgba(245,158,11,.35)':'rgba(239,68,68,.35)';
const C={gym:{m:'#f97316'},morning:{m:'#06b6d4'},reading:{m:'#10b981'},calories:{m:'#f59e0b'},protein:{m:'#ec4899'},sleep:{m:'#3b82f6'},steps:{m:'#22c55e'},water:{m:'#0ea5e9'},energy:{m:'#eab308'}};
const IC={w:'#f59e0b',g:'#10b981',b:'#ef4444',i:'#06b6d4'};
const II={w:'тЪа',g:'тЖС',b:'тЖУ',i:'тЖТ'};

function weakestLink(log,t){
  if(!log)return null;
  const ms=[
    log.gym!==null&&{key:'gym',label:'Gym',icon:'ЁЯПЛя╕П',score:log.gym?100:20,color:C.gym.m,desc:log.gym?'Already done тАФ great!':'Skipped training today'},
    log.calories!=null&&{key:'calories',label:'Calories',icon:'ЁЯФе',score:sCAL(log.calories,t.calories),color:C.calories.m,desc:`${log.calories} vs ${t.calories}kcal target`},
    log.protein!=null&&{key:'protein',label:'Protein',icon:'ЁЯей',score:sPRO(log.protein,t.protein),color:C.protein.m,desc:`${log.protein}g vs ${t.protein}g target`},
    log.sleep!=null&&{key:'sleep',label:'Sleep',icon:'ЁЯШ┤',score:sSLP(log.sleep,t.sleep),color:C.sleep.m,desc:`${log.sleep}h vs ${t.sleep}h target`},
    log.steps!=null&&{key:'steps',label:'Steps',icon:'ЁЯСЯ',score:sSTP(log.steps,t.steps),color:C.steps.m,desc:`${log.steps} vs ${t.steps} steps`},
    log.energy!=null&&{key:'energy',label:'Energy',icon:'тЪб',score:log.energy*10,color:C.energy.m,desc:`Energy at ${log.energy}/10`},
    log.water!=null&&{key:'water',label:'Water',icon:'ЁЯТз',score:Math.min(100,Math.round((log.water/t.water)*100)),color:C.water.m,desc:`${log.water}L vs ${t.water}L target`},
  ].filter(Boolean);
  if(ms.length<2)return null;
  return ms.reduce((mn,m)=>m.score<mn.score?m:mn);
}

function insights(logs,t){
  const ins=[],r=lastN(logs,14),tod=logs.find(l=>l.date===today());
  const sd=r.filter(l=>l?.sleep!=null);
  if(sd.length>=3){const avg=sd.reduce((a,l)=>a+l.sleep,0)/sd.length;
    ins.push(avg<t.sleep-.5?{k:'w',m:`Avg sleep ${avg.toFixed(1)}h тАФ ${(t.sleep-avg).toFixed(1)}h below target`}:{k:'g',m:`Sleep avg ${avg.toFixed(1)}h тАФ on target`});}
  const gd=r.filter(l=>l?.gym===true).length;
  if(gd>=8)ins.push({k:'g',m:`${gd}/14 training days тАФ elite consistency`});
  else if(gd<=4&&r.filter(l=>l!=null).length>=7)ins.push({k:'b',m:`${gd}/14 training days тАФ below target`});
  const cd=r.filter(l=>l?.calories!=null);
  if(cd.length>=5){const h=cd.filter(l=>l.calories<=t.calories).length;
    ins.push(h/cd.length>=.8?{k:'g',m:`Calorie control ${Math.round(h/cd.length*100)}% тАФ strong discipline`}:{k:'w',m:`Calorie target missed ${cd.length-h}/${cd.length} days`});}
  if(tod?.energy>=8)ins.push({k:'i',m:`Energy ${tod.energy}/10 тАФ capitalize now`});
  else if(tod?.energy!=null&&tod.energy<=4)ins.push({k:'w',m:'Low energy today тАФ prioritize recovery'});
  if(r.filter(l=>l?.protein!=null&&l.protein<t.protein*.8).length>=4)ins.push({k:'w',m:'Protein under 80% тАФ impacts recovery'});
  if(!ins.length)ins.push({k:'i',m:'Log daily metrics to unlock AI insights'});
  return ins.slice(0,4);
}

function patterns(logs,t){
  const r30=lastN(logs,30),items=[];
  const byDow=Array.from({length:7},()=>[]);
  r30.forEach(l=>{if(!l)return;const s=calcScore(l,t);if(s!=null)byDow[new Date(l.date+'T12:00:00').getDay()].push(s);});
  const dowAvg=byDow.map(arr=>arr.length?Math.round(arr.reduce((a,b)=>a+b)/arr.length):null);
  const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const bestDow=dowAvg.reduce((bi,v,i)=>v!=null&&(bi===-1||v>(dowAvg[bi]??0))?i:bi,-1);
  const worstDow=dowAvg.reduce((bi,v,i)=>v!=null&&(bi===-1||v<(dowAvg[bi]??999))?i:bi,-1);
  if(bestDow>=0&&dowAvg[bestDow]!=null)items.push({k:'g',m:`Peak day: ${DN[bestDow]}s avg ${dowAvg[bestDow]} тАФ protect that schedule`});
  if(worstDow>=0&&worstDow!==bestDow&&dowAvg[worstDow]!=null)items.push({k:'w',m:`${DN[worstDow]}s drag avg (${dowAvg[worstDow]}) тАФ identify the blocker`});
  const slD=r30.filter(l=>l?.sleep!=null);
  if(slD.length>=5){
    const good=slD.filter(l=>l.sleep>=t.sleep-.5),bad=slD.filter(l=>l.sleep<t.sleep-.5);
    if(good.length>=2&&bad.length>=2){
      const ga=Math.round(good.map(l=>calcScore(l,t)).filter(s=>s!=null).reduce((a,b)=>a+b,0)/good.length);
      const ba=Math.round(bad.map(l=>calcScore(l,t)).filter(s=>s!=null).reduce((a,b)=>a+b,0)/bad.length);
      if(ga-ba>4)items.push({k:'i',m:`Sleep тЙе${t.sleep}h boosts score by ~${ga-ba} pts on avg`});
    }
  }
  const gymD=r30.filter(l=>l?.gym===true),restD=r30.filter(l=>l?.gym===false);
  if(gymD.length>=3&&restD.length>=3){
    const ga=Math.round(gymD.map(l=>calcScore(l,t)).filter(s=>s!=null).reduce((a,b)=>a+b,0)/gymD.length);
    const ra=Math.round(restD.map(l=>calcScore(l,t)).filter(s=>s!=null).reduce((a,b)=>a+b,0)/restD.length);
    if(Math.abs(ga-ra)>3)items.push({k:ga>ra?'g':'b',m:`Gym days score ${Math.abs(ga-ra)} pts ${ga>ra?'higher':'lower'} than rest days`});
  }
  const rsc=r30.filter(l=>l!=null).map(l=>calcScore(l,t)).filter(s=>s!=null),rec5=rsc.slice(-5);
  if(rec5.length>=3&&rec5.every(s=>s<50))items.push({k:'b',m:'5-day streak below 50 тАФ recovery reset needed'});
  else if(rec5.length>=3&&rec5.every(s=>s>=70))items.push({k:'g',m:`${rec5.length}-day elite streak тАФ momentum building`});
  if(!items.length)items.push({k:'i',m:'Log 7+ days to unlock pattern analysis'});
  return items.slice(0,4);
}

function HeatmapCalendar({logs,tgts}){
  const [hov,setHov]=useState(null);
  const cells=Array.from({length:91},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(90-i));const dt=ds(d);const l=logs.find(x=>x.date===dt);const s=l?calcScore(l,tgts):null;return{dt,s,dow:d.getDay()};});
  const weeks=[];let wk=[];
  for(let i=0;i<cells[0].dow;i++)wk.push(null);
  cells.forEach(c=>{wk.push(c);if(wk.length===7){weeks.push(wk);wk=[];}});
  if(wk.length){while(wk.length<7)wk.push(null);weeks.push(wk);}
  const sz=11,gp=2;
  return html`
    <div style=${{position:'relative',paddingTop:30}}>
      <div style=${{display:'flex',gap:gp+'px',overflowX:'auto',paddingBottom:2}}>
        ${weeks.map((wk,wi)=>html`
          <div key=${wi} style=${{display:'flex',flexDirection:'column',gap:gp+'px',flexShrink:0}}>
            ${wk.map((c,di)=>{
              if(!c)return html`<div key=${di} style=${{width:sz,height:sz}}></div>`;
              const isToday=c.dt===today();
              const bg=c.s!=null?SC(c.s):'rgba(255,255,255,.07)';
              return html`<div key=${di} onMouseEnter=${()=>setHov(c)} onMouseLeave=${()=>setHov(null)} style=${{width:sz,height:sz,borderRadius:2,background:bg,opacity:c.s!=null?1:.45,boxShadow:c.s!=null?`0 0 5px ${bg}55`:undefined,outline:isToday?`1.5px solid ${c.s!=null?bg:'#8b5cf6'}`:undefined,cursor:'default',transition:'opacity .1s'}}></div>`;
            })}
          </div>`)}
      </div>
      ${hov&&html`<div style=${{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',background:'#0d0d1a',border:'1px solid rgba(255,255,255,.14)',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:700,color:'#e2e8f0',whiteSpace:'nowrap',pointerEvents:'none',zIndex:10}}>
        ${hov.dt} ┬╖ ${hov.s!=null?html`<span style=${{color:SC(hov.s),fontWeight:900}}>${hov.s} pts тАФ ${SL(hov.s)}</span>`:'no log'}
      </div>`}
      <div style=${{display:'flex',gap:5,alignItems:'center',marginTop:9,justifyContent:'flex-end'}}>
        <span style=${{fontSize:9,color:'#334155',fontWeight:600}}>Low</span>
        ${[['rgba(255,255,255,.07)','none'],['#ef4444','Critical'],['#f59e0b','Sub'],['#8b5cf6','On track'],['#10b981','Optimal']].map(([c,l],i)=>html`<div key=${i} title=${l} style=${{width:10,height:10,borderRadius:2,background:c}}></div>`)}
        <span style=${{fontSize:9,color:'#334155',fontWeight:600}}>High</span>
      </div>
    </div>`;
}

function Ring({score,size=200}){
  const [on,setOn]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setOn(true),200);return()=>clearTimeout(t);},[]);
  const r=size/2-14,circ=2*Math.PI*r;
  const off=on&&score!=null?circ*(1-score/100):circ;
  const col=score!=null?SC(score):'#1e293b';
  return html`
    <div style=${{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <div class="gp" style=${{position:'absolute',inset:-30,borderRadius:'50%',background:score!=null?`radial-gradient(circle,${SG(score)} 0%,transparent 65%)`:'transparent'}}></div>
      <svg width=${size} height=${size} style=${{transform:'rotate(-90deg)',position:'absolute',zIndex:1}}>
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="11"/>
        ${score!=null&&html`<circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${col} strokeWidth="11" strokeLinecap="round"
          strokeDasharray=${circ+' '+circ} strokeDashoffset=${off}
          style=${{transition:'stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)',filter:`drop-shadow(0 0 18px ${col}) drop-shadow(0 0 36px ${col}66)`}}/>`}
        ${Array.from({length:36},(_,i)=>{const a=(i/36)*2*Math.PI,ri=r-18,ro=r-13;
          return html`<line key=${i} x1=${(size/2+Math.cos(a)*ri).toFixed(1)} y1=${(size/2+Math.sin(a)*ri).toFixed(1)} x2=${(size/2+Math.cos(a)*ro).toFixed(1)} y2=${(size/2+Math.sin(a)*ro).toFixed(1)} stroke="rgba(255,255,255,.05)" strokeWidth="1"/>`;})}
      </svg>
      <div style=${{position:'absolute',textAlign:'center',zIndex:2}}>
        <div style=${{fontSize:7.5,color:'#334155',fontWeight:800,textTransform:'uppercase',letterSpacing:'.22em',marginBottom:4}}>SYSTEM STATUS</div>
        <div class="ac" style=${{fontSize:score!=null?52:26,fontWeight:900,letterSpacing:'-2.5px',lineHeight:1,color:score!=null?col:'#1e293b',textShadow:score!=null?`0 0 36px ${col}cc`:'none'}}>${score!=null?score:'тАФ'}</div>
        ${score!=null&&html`<div style=${{fontSize:8,fontWeight:800,letterSpacing:'.2em',color:col,marginTop:7,textTransform:'uppercase',textShadow:`0 0 14px ${col}99`}}>${SL(score)}</div>`}
      </div>
    </div>`;
}

function Chart({data,color,h=70}){
  const W=280,vals=data.map(d=>d?.v??null),filled=vals.filter(v=>v!=null);
  if(filled.length<2)return html`<div style=${{height:h,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#1e293b',gap:8}}><span style=${{width:24,height:1,display:'block',background:'rgba(255,255,255,.06)'}}></span>No data yet<span style=${{width:24,height:1,display:'block',background:'rgba(255,255,255,.06)'}}></span></div>`;
  const lo=Math.max(0,Math.min(...filled)-5),hi=Math.min(100,Math.max(...filled)+5),rng=hi-lo||10,n=vals.length;
  const px=(i,v)=>({x:(i/(n-1))*W,y:h-((v-lo)/rng)*(h*.85)-h*.07});
  let path='',area='',go=false;const pts=[];
  for(let i=0;i<n;i++){const v=vals[i];if(v==null){go=false;continue;}const p=px(i,v);pts.push(p);
    if(!go){path+=`M${p.x.toFixed(1)} ${p.y.toFixed(1)}`;area+=`M${p.x.toFixed(1)} ${h}`;go=true;}
    else path+=` L${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    area+=` L${p.x.toFixed(1)} ${p.y.toFixed(1)}`;}
  if(pts.length)area+=` L${pts[pts.length-1].x.toFixed(1)} ${h} Z`;
  const gid='g'+color.replace('#','');
  return html`
    <svg viewBox="0 0 ${W} ${h}" width="100%" height=${h} preserveAspectRatio="none" style=${{overflow:'visible'}}>
      <defs><linearGradient id=${gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor=${color} stopOpacity="0.32"/><stop offset="100%" stopColor=${color} stopOpacity="0"/></linearGradient></defs>
      ${area&&html`<path d=${area} fill=${'url(#'+gid+')'}/>`}
      ${path&&html`<path d=${path} fill="none" stroke=${color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style=${{filter:`drop-shadow(0 0 5px ${color}) drop-shadow(0 0 2px ${color})`}}/>`}

const gPct=g=>{const{current:cu,target:ta,start:st,dir}=g;if(dir==='up'){if(ta===st)return 100;return Math.min(100,Math.max(0,Math.round((cu-st)/(ta-st)*100)));}else{if(ta===st)return 100;return Math.min(100,Math.max(0,Math.round((st-cu)/(st-ta)*100)));}};

function Goals({goals,setGoals}){
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(newG());
  const openAdd=()=>{setForm(newG());setEditId(null);setShowAdd(true);};
  const openEdit=g=>{setForm({...g});setEditId(g.id);setShowAdd(true);};
  const save=()=>{if(!form.title.trim())return;if(editId)setGoals(goals.map(g=>g.id===editId?{...form}:g));else setGoals([...goals,{...form,id:Date.now().toString()}]);setShowAdd(false);setEditId(null);};
  const del=id=>setGoals(goals.filter(g=>g.id!==id));
  const ff=(k,v)=>setForm(f=>({...f,[k]:v}));
  return html`
    <div style=${{padding:'16px 20px',height:'100%',overflowY:'auto'}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div><div style=${{fontSize:22,fontWeight:900,letterSpacing:'-.5px',marginBottom:2}}>Goals</div><div style=${{fontSize:12,color:'#64748b',fontWeight:500}}>Big aspirations тАФ trackable, personal, real</div></div>
        <button class="btnp" onClick=${openAdd}>+ Add Goal</button>
      </div>
      <div style=${{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        ${CATS.map(({id,l,i,c})=>{const n=goals.filter(g=>g.cat===id).length;return n?html`<div key=${id} class="tag" style=${{background:`${c}14`,border:`1px solid ${c}33`,color:c}}>${i} ${l} ${n}</div>`:null;})}
      </div>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:11}}>
        ${goals.map(g=>{
          const pct=gPct(g),done=pct>=100,cat=catOf(g.cat);
          return html`
            <div key=${g.id} class="card" style=${{padding:'18px',borderLeft:`3px solid ${g.color}`,position:'relative'}}>
              ${done&&html`<div style=${{position:'absolute',top:12,right:12,fontSize:10,fontWeight:800,color:'#10b981',background:'rgba(16,185,129,.12)',border:'1px solid rgba(16,185,129,.25)',padding:'2px 9px',borderRadius:20}}>тЬУ ACHIEVED</div>`}
              <div style=${{display:'flex',alignItems:'flex-start',gap:11,marginBottom:13}}>
                <div style=${{width:44,height:44,borderRadius:12,background:`${g.color}1c`,border:`1px solid ${g.color}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,boxShadow:`0 0 16px ${g.color}33`}}>${g.icon}</div>
                <div style=${{flex:1}}>
                  <div style=${{fontSize:15,fontWeight:900,color:'#f1f5f9',marginBottom:3}}>${g.title}</div>
                  <div style=${{fontSize:10,color:cat.c,fontWeight:700}}>${cat.i} ${cat.l}</div>
                </div>
              </div>
              <div style=${{marginBottom:12}}>
                <div style=${{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                  <span style=${{fontSize:10,color:'#64748b',fontWeight:600}}>Progress</span>
                  <span style=${{fontSize:13,fontWeight:900,color:done?'#10b981':g.color,textShadow:`0 0 10px ${done?'#10b981':g.color}66`}}>${pct}%</span>
                </div>
                <div class="trk" style=${{height:6}}><div class="fil" style=${{width:`${pct}%`,background:done?'#10b981':g.color,boxShadow:`0 0 8px ${done?'#10b981':g.color}77`,height:'100%'}}></div></div>
              </div>
              <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div><div style=${{fontSize:8,color:'#334155',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:2}}>Current</div><div style=${{fontSize:20,fontWeight:900,color:g.color,letterSpacing:'-.5px',textShadow:`0 0 16px ${g.color}66`}}>${g.current}<span style=${{fontSize:10,fontWeight:500,color:'#475569',marginLeft:3}}>${g.unit}</span></div></div>
                <div style=${{color:'#1e293b',fontSize:18}}>тЖТ</div>
                <div style=${{textAlign:'right'}}><div style=${{fontSize:8,color:'#334155',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:2}}>Target</div><div style=${{fontSize:20,fontWeight:900,color:'#94a3b8',letterSpacing:'-.5px'}}>${g.target}<span style=${{fontSize:10,fontWeight:500,color:'#475569',marginLeft:3}}>${g.unit}</span></div></div>
              </div>
              ${g.deadline&&html`<div style=${{fontSize:10,color:'#475569',marginBottom:11}}>ЁЯУЕ ${new Date(g.deadline).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>`}
              <div style=${{display:'flex',gap:6}}>
                <button onClick=${()=>openEdit(g)} style=${{flex:1,padding:'8px',borderRadius:8,border:`1px solid ${g.color}44`,background:`${g.color}0a`,color:g.color,fontSize:11,fontWeight:800,cursor:'pointer',fontFamily:'inherit',transition:'all .15s'}}>Update</button>
                <button onClick=${()=>del(g.id)} style=${{padding:'8px 12px',borderRadius:8,border:'1px solid rgba(239,68,68,.25)',background:'rgba(239,68,68,.05)',color:'#f87171',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>тЬХ</button>
              </div>
            </div>`;
        })}
      </div>
      ${goals.length===0&&html`
        <div style=${{textAlign:'center',padding:'52px 0',color:'#334155'}}>
          <div style=${{fontSize:44,marginBottom:12}}>ЁЯОп</div>
          <div style=${{fontSize:17,fontWeight:800,color:'#475569',marginBottom:6}}>No goals yet</div>
          <div style=${{fontSize:13,marginBottom:20,color:'#334155'}}>Set your first big aspiration</div>
          <button class="btnp" onClick=${openAdd}>+ Add Your First Goal</button>
        </div>`}
      ${showAdd&&html`
        <div class="overlay" onClick=${e=>{if(e.target===e.currentTarget){setShowAdd(false);setEditId(null);}}}>
          <div class="modal">
            <div style=${{fontSize:17,fontWeight:900,marginBottom:18}}>${editId?'Update Goal':'New Goal'}</div>
            <div style=${{display:'flex',flexDirection:'column',gap:12}}>
              <div>
                <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Goal Title</div>
                <input class="inp" placeholder="e.g. Get visible abs" value=${form.title} onInput=${e=>ff('title',e.target.value)}/>
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Category</div>
                  <select class="inp" value=${form.cat} onChange=${e=>{const cat=catOf(e.target.value);ff('cat',e.target.value);ff('icon',cat.i);ff('color',cat.c);}}>${CATS.map(c=>html`<option key=${c.id} value=${c.id}>${c.i} ${c.l}</option>`)}</select>
                </div>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Unit</div>
                  <input class="inp" placeholder="kg, %, km, reps..." value=${form.unit} onInput=${e=>ff('unit',e.target.value)}/>
                </div>
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                ${[['start','Start'],['current','Current'],['target','Target']].map(([k,l])=>html`
                  <div key=${k}>
                    <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>${l}</div>
                    <input type="number" class="inp" value=${form[k]} onChange=${e=>ff(k,parseFloat(e.target.value)||0)} style=${{colorScheme:'dark'}}/>
                  </div>`)}
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Direction</div>
                  <select class="inp" value=${form.dir} onChange=${e=>ff('dir',e.target.value)}><option value="up">тЖС Higher is better</option><option value="down">тЖУ Lower is better</option></select>
                </div>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Deadline</div>
                  <input type="date" class="inp" value=${form.deadline||''} onChange=${e=>ff('deadline',e.target.value)} style=${{colorScheme:'dark'}}/>
                </div>
              </div>
              <div>
                <div style=${{fontSize:9.5,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Auto-Track From Daily Log</div>
                <select class="inp" value=${form.linkedMetric||'none'} onChange=${e=>ff('linkedMetric',e.target.value)}>
                  <option value="none">None (update manually)</option>
                  <option value="weight">тЪЦя╕П Weight (kg)</option>
                  <option value="steps">ЁЯСЯ Steps</option>
                  <option value="sleep">ЁЯШ┤ Sleep (h)</option>
                  <option value="protein">ЁЯей Protein (g)</option>
                  <option value="calories">ЁЯФе Calories (kcal)</option>
                  <option value="water">ЁЯТз Water (L)</option>
                </select>
                ${form.linkedMetric&&form.linkedMetric!=='none'&&html`<div style=${{fontSize:9.5,color:'#10b981',marginTop:5,fontWeight:600}}>тЬУ Current value auto-syncs when you log</div>`}
              </div>
              <div style=${{display:'flex',gap:8,marginTop:4}}>
                <button class="btnp" style=${{flex:1}} onClick=${save}>${editId?'Update':'Add Goal'}</button>
                <button onClick=${()=>{setShowAdd(false);setEditId(null);}} style=${{padding:'10px 18px',borderRadius:9,border:'1px solid rgba(255,255,255,.08)',background:'transparent',color:'#64748b',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
              </div>
            </div>
          </div>
        </div>`}
    </div>`;
}

function Settings({tgts,setTgts,settings,setSettings}){
  const [tf,setTf]=useState(tgts);
  const [ok,setOk]=useState(false);
  const saveTgts=()=>{setTgts(tf);sv(TK,tf);setOk(true);setTimeout(()=>setOk(false),2000);};
  const exportData=()=>{
    const d={logs:ld(LK)||[],targets:ld(TK)||DT,goals:ld(GK)||DG,settings:ld(SK)||DS,exported:new Date().toISOString()};
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'})),download:`perf-os-${today()}.json`});a.click();
  };
  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.logs)sv(LK,d.logs);if(d.targets)sv(TK,d.targets);if(d.goals)sv(GK,d.goals);alert('Imported! Reload to see changes.');}catch{alert('Invalid file.');}};r.readAsText(file);
  };
  const flds=[
    {k:'calories',l:'Daily Calorie Target',u:'kcal',i:'ЁЯФе',s:50,mn:1000,mx:5000},
    {k:'protein',l:'Protein Target',u:'g',i:'ЁЯей',s:5,mn:50,mx:300},
    {k:'sleep',l:'Sleep Target',u:'h',i:'ЁЯШ┤',s:.5,mn:4,mx:12},
    {k:'steps',l:'Steps Target',u:'',i:'ЁЯСЯ',s:500,mn:1000,mx:30000},
    {k:'gymPerWeek',l:'Gym Sessions/Week',u:'x/wk',i:'ЁЯПЛя╕П',s:1,mn:1,mx:7},
    {k:'water',l:'Water Target',u:'L',i:'ЁЯТз',s:.25,mn:1,mx:6},
  ];
  return html`
    <div style=${{padding:'16px 20px',height:'100%',overflowY:'auto'}}>
      <div style=${{marginBottom:16}}><div style=${{fontSize:22,fontWeight:900,letterSpacing:'-.5px',marginBottom:2}}>Settings</div><div style=${{fontSize:12,color:'#64748b',fontWeight:500}}>Targets, preferences, and data</div></div>
      <div class="card" style=${{padding:'17px',marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:800,color:'#64748b',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:13}}>Daily Targets</div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(195px,1fr))',gap:9,marginBottom:13}}>
          ${flds.map(({k,l,u,i,s,mn,mx})=>html`
            <div key=${k} style=${{padding:'12px',background:'rgba(255,255,255,.02)',borderRadius:10,border:'1px solid rgba(255,255,255,.06)'}}>
              <div style=${{display:'flex',alignItems:'center',gap:6,marginBottom:9}}><span style=${{fontSize:14}}>${i}</span><span style=${{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>${l}</span></div>
              <div style=${{display:'flex',alignItems:'center',gap:6}}>
                <button class="bsm" onClick=${()=>setTf(p=>({...p,[k]:Math.max(mn,p[k]-s)}))}> тИТ</button>
                <input type="number" value=${tf[k]} onChange=${e=>{const n=parseFloat(e.target.value);if(!isNaN(n))setTf(p=>({...p,[k]:Math.min(mx,Math.max(mn,n))}));}} style=${{flex:1,textAlign:'center',fontSize:18,fontWeight:900,color:'#f1f5f9',background:'transparent',border:'none',borderBottom:'1px solid rgba(255,255,255,.08)',outline:'none',padding:'3px 0',colorScheme:'dark',fontFamily:'inherit'}}/>
                <span style=${{fontSize:10,color:'#475569',minWidth:22,textAlign:'right'}}>${u}</span>
                <button class="bsm" onClick=${()=>setTf(p=>({...p,[k]:Math.min(mx,p[k]+s)}))}>+</button>
              </div>
            </div>`)}
        </div>
        <button onClick=${saveTgts} style=${{padding:'10px 24px',borderRadius:9,border:'none',cursor:'pointer',fontSize:12,fontWeight:800,background:ok?'rgba(16,185,129,.15)':'linear-gradient(135deg,#8b5cf6,#06b6d4)',color:ok?'#10b981':'white',transition:'all .3s',fontFamily:'inherit',boxShadow:ok?'none':'0 4px 16px rgba(139,92,246,.4)'}}>${ok?'тЬУ Saved':'Save Targets'}</button>
      </div>
      <div class="card" style=${{padding:'17px',marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:800,color:'#64748b',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:13}}>Preferences</div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><div style=${{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>Units</div><select class="inp" value=${settings.units} onChange=${e=>setSettings(s=>({...s,units:e.target.value}))}><option value="metric">Metric (kg, km)</option><option value="imperial">Imperial (lbs, mi)</option></select></div>
          <div><div style=${{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:6}}>Week Starts On</div><select class="inp" value=${settings.weekStart} onChange=${e=>setSettings(s=>({...s,weekStart:e.target.value}))}><option value="mon">Monday</option><option value="sun">Sunday</option></select></div>
        </div>
      </div>
      <div class="card" style=${{padding:'17px',marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:800,color:'#64748b',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:13}}>Data Management</div>
        <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick=${exportData} style=${{padding:'9px 16px',borderRadius:8,border:'1px solid rgba(139,92,246,.3)',background:'rgba(139,92,246,.08)',color:'#c4b5fd',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>тЖУ Export JSON</button>
          <label style=${{padding:'9px 16px',borderRadius:8,border:'1px solid rgba(6,182,212,.3)',background:'rgba(6,182,212,.08)',color:'#22d3ee',fontSize:12,fontWeight:700,cursor:'pointer'}}>тЖС Import JSON<input type="file" accept=".json" onChange=${importData} style=${{display:'none'}}/></label>
          <button class="btnd" onClick=${()=>{if(confirm('Clear ALL data? This cannot be undone.')){localStorage.clear();window.location.reload();}}}>тЬХ Clear All Data</button>
        </div>
      </div>
      <div class="card" style=${{padding:'17px'}}>
        <div style=${{fontSize:9,fontWeight:800,color:'#64748b',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:10}}>About</div>
        <p style=${{fontSize:12,color:'#64748b',lineHeight:1.9}}><strong style=${{color:'#94a3b8'}}>Performance OS v2.0</strong> тАФ Your personal mission control.<br/>All data stored locally. No account, no cloud, no tracking.</p>
      </div>
    </div>`;
}

function App(){
  const [logs,setLogs]=useState([]),[tgts,setTgts]=useState(DT),[goals,setGoals]=useState(DG),[settings,setSettings]=useState(DS),[page,setPage]=useState('dashboard');
  useEffect(()=>{setLogs(loadLogs());setTgts({...DT,...(ld(TK)||{})});setGoals(ld(GK)||DG);setSettings({...DS,...(ld(SK)||{})});},[]);
  const onChange=up=>{
    const n=upsert(logs,up);setLogs(n);saveLogs(n);
    const upG=goals.map(g=>{
      if(!g.linkedMetric||g.linkedMetric==='none')return g;
      const rec=[...n].filter(l=>l[g.linkedMetric]!=null).sort((a,b)=>b.date.localeCompare(a.date))[0];
      return rec?{...g,current:rec[g.linkedMetric]}:g;
    });
    if(upG.some((g,i)=>g.current!==goals[i].current)){setGoals(upG);sv(GK,upG);}
  };
  const saveGoals=g=>{setGoals(g);sv(GK,g);};
  const saveSettings=s=>{setSettings(s);sv(SK,s);};
  const saveTgts=t=>{setTgts(t);sv(TK,t);};
  const score=calcScore(getTodayLog(logs),tgts);
  const bg=score!=null?`radial-gradient(ellipse 80% 35% at 50% -5%,${SG(score)} 0%,transparent 55%)`:'radial-gradient(ellipse 80% 35% at 50% -5%,rgba(139,92,246,.12) 0%,transparent 55%)';
  return html`
    <div style=${{display:'flex',height:'100vh',background:'#05050a',backgroundImage:bg,overflow:'hidden'}}>
      <${Sidebar} page=${page} setPage=${setPage} score=${score}/>
      <main style=${{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        ${page==='dashboard'&&html`<${Dashboard} logs=${logs} tgts=${tgts} onChange=${onChange}/>`}
        ${page==='analytics'&&html`<${Analytics} logs=${logs} tgts=${tgts}/>`}
        ${page==='reviews'&&html`<${Reviews} logs=${logs} tgts=${tgts}/>`}
        ${page==='goals'&&html`<${Goals} goals=${goals} setGoals=${saveGoals}/>`}
        ${page==='settings'&&html`<${Settings} tgts=${tgts} setTgts=${saveTgts} settings=${settings} setSettings=${saveSettings}/>`}
      </main>
    </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
