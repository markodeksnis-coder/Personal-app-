<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:#05050a;color:#f1f5f9;overflow:hidden}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(139,92,246,.35);border-radius:2px}
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes bar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    @keyframes pop{from{opacity:0;transform:scale(.88) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .au{animation:up .45s cubic-bezier(.16,1,.3,1) both}
    .ac{animation:pop .7s cubic-bezier(.34,1.56,.64,1) both}
    .gp{animation:pulse 3s ease-in-out infinite}
    .fi{animation:fadein .2s ease both}
    .card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:border-color .2s,background .2s}
    .card:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.035)}
    .nav{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:9px;cursor:pointer;color:#475569;font-size:13px;font-weight:500;transition:all .15s;border:1px solid transparent;user-select:none}
    .nav:hover{background:rgba(255,255,255,.04);color:#94a3b8}
    .active{background:rgba(139,92,246,.12)!important;color:#a78bfa!important;border-color:rgba(139,92,246,.2)!important}
    .trk{height:4px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
    .fil{height:100%;border-radius:4px;transform-origin:left;animation:bar 1s cubic-bezier(.4,0,.2,1) both}
    .bsm{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#64748b;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .15s}
    .bsm:hover{border-color:rgba(139,92,246,.3);color:#a78bfa;background:rgba(139,92,246,.08)}
    .tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .inp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#f1f5f9;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;width:100%;font-family:inherit}
    .inp:focus{border-color:rgba(139,92,246,.4)}
    .inp option{background:#0d0d1a}
    .btnp{padding:10px 22px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:white;box-shadow:0 4px 18px rgba(139,92,246,.3);transition:all .2s;font-family:inherit}
    .btnp:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,92,246,.4)}
    .btnd{padding:9px 16px;border-radius:8px;border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.05);color:#ef4444;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
    .btnd:hover{background:rgba(239,68,68,.12)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadein .15s ease}
    .modal{background:#0c0c1a;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:26px;width:440px;max-width:92vw;max-height:90vh;overflow-y:auto}
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import React,{useState,useEffect} from 'https://esm.sh/react@18';
import{createRoot} from 'https://esm.sh/react-dom@18/client';
import htm from 'https://esm.sh/htm';
const html=htm.bind(React.createElement);

const LK='perf-os-v1',TK='perf-tgts-v1',GK='perf-goals-v3',SK='perf-set-v1';
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>ds(new Date());
const ld=k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

const DT={calories:2200,protein:150,sleep:7.5,steps:10000,gymPerWeek:6,water:3};
const DS={units:'metric',weekStart:'mon'};
const DG=[
  {id:'g1',title:'Get Visible Abs',cat:'body',icon:'🔥',color:'#f97316',current:18,target:10,start:22,unit:'% body fat',dir:'down',deadline:''},
  {id:'g2',title:'Bench Press 100kg',cat:'strength',icon:'💪',color:'#8b5cf6',current:70,target:100,start:60,unit:'kg',dir:'up',deadline:''},
  {id:'g3',title:'Run 5km Non-Stop',cat:'endurance',icon:'🏃',color:'#10b981',current:2,target:5,start:0,unit:'km',dir:'up',deadline:''},
  {id:'g4',title:'Cut to 82kg',cat:'body',icon:'⚖️',color:'#06b6d4',current:90,target:82,start:95,unit:'kg',dir:'down',deadline:''},
];

const loadLogs=()=>ld(LK)||[];
const saveLogs=l=>sv(LK,l.slice(-120));
const getTodayLog=logs=>logs.find(l=>l.date===today())||{date:today(),gym:null,calories:null,protein:null,sleep:null,steps:null,energy:null,morningRoutine:null,reading:null,water:null};
const upsert=(logs,log)=>{const i=logs.findIndex(l=>l.date===log.date),n=[...logs];i>=0?n[i]=log:n.push(log);return n.sort((a,b)=>a.date.localeCompare(b.date));};
const lastN=(logs,n)=>Array.from({length:n},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(n-1-i));return ds(d);}).map(dt=>logs.find(l=>l.date===dt)||null);
const streakFn=(logs,fn)=>{let s=0;const d=new Date();for(let i=0;i<90;i++){const l=logs.find(x=>x.date===ds(d));if(l&&fn(l))s++;else break;d.setDate(d.getDate()-1);}return s;};

const sCAL=(v,g)=>v<=g?100:Math.max(0,Math.round(((g*1.5-v)/(g*.5))*100));
const sPRO=(v,g)=>Math.min(100,Math.round((v/g)*100));
const sSLP=(v,g)=>Math.max(0,Math.round((1-Math.abs(v-g)/g)*100));
const sSTP=(v,g)=>Math.min(100,Math.round((v/g)*100));
const calcScore=(log,t)=>{
  if(!log)return null;
  const s=[];
  if(log.gym!==null)s.push(log.gym?100:20);
  if(log.calories!=null)s.push(sCAL(log.calories,t.calories));
  if(log.protein!=null)s.push(sPRO(log.protein,t.protein));
  if(log.sleep!=null)s.push(sSLP(log.sleep,t.sleep));
  if(log.steps!=null)s.push(sSTP(log.steps,t.steps));
  if(log.energy!=null)s.push(log.energy*10);
  if(log.morningRoutine!==null)s.push(log.morningRoutine?100:20);
  if(log.reading!==null)s.push(log.reading?100:50);
  if(log.water!=null)s.push(Math.min(100,Math.round((log.water/t.water)*100)));
  return s.length?Math.round(s.reduce((a,b)=>a+b)/s.length):null;
};
const SC=s=>s>=80?'#10b981':s>=60?'#8b5cf6':s>=40?'#f59e0b':'#ef4444';
const SL=s=>s>=80?'OPTIMAL':s>=60?'PERFORMING':s>=40?'SUBOPTIMAL':'CRITICAL';
const SG=s=>s>=80?'rgba(16,185,129,.35)':s>=60?'rgba(139,92,246,.35)':s>=40?'rgba(245,158,11,.25)':'rgba(239,68,68,.25)';

const C={gym:{m:'#f97316',b:'rgba(249,115,22,.12)'},morning:{m:'#06b6d4',b:'rgba(6,182,212,.12)'},reading:{m:'#10b981',b:'rgba(16,185,129,.12)'},calories:{m:'#f59e0b',b:'rgba(245,158,11,.12)'},protein:{m:'#ec4899',b:'rgba(236,72,153,.12)'},sleep:{m:'#3b82f6',b:'rgba(59,130,246,.12)'},steps:{m:'#22c55e',b:'rgba(34,197,94,.12)'},water:{m:'#0ea5e9',b:'rgba(14,165,233,.12)'},energy:{m:'#eab308',b:'rgba(234,179,8,.12)'}};

function insights(logs,t){
  const ins=[],r=lastN(logs,14),tod=logs.find(l=>l.date===today());
  const sd=r.filter(l=>l?.sleep!=null);
  if(sd.length>=3){const avg=sd.reduce((a,l)=>a+l.sleep,0)/sd.length;
    ins.push(avg<t.sleep-.5?{k:'w',m:`Avg sleep ${avg.toFixed(1)}h — ${(t.sleep-avg).toFixed(1)}h below target`}:{k:'g',m:`Sleep avg ${avg.toFixed(1)}h — on target`});}
  const gd=r.filter(l=>l?.gym===true).length;
  if(gd>=8)ins.push({k:'g',m:`${gd}/14 training days — elite consistency`});
  else if(gd<=4&&r.filter(l=>l!=null).length>=7)ins.push({k:'b',m:`${gd}/14 training days — below target`});
  const cd=r.filter(l=>l?.calories!=null);
  if(cd.length>=5){const h=cd.filter(l=>l.calories<=t.calories).length;
    ins.push(h/cd.length>=.8?{k:'g',m:`Calorie control ${Math.round(h/cd.length*100)}% — strong discipline`}:{k:'w',m:`Calorie target missed ${cd.length-h}/${cd.length} days`});}
  if(tod?.energy>=8)ins.push({k:'i',m:`Energy ${tod.energy}/10 — capitalize now`});
  else if(tod?.energy!=null&&tod.energy<=4)ins.push({k:'w',m:'Low energy — prioritize recovery'});
  if(r.filter(l=>l?.protein!=null&&l.protein<t.protein*.8).length>=4)ins.push({k:'w',m:'Protein under 80% — impacts recovery'});
  if(!ins.length)ins.push({k:'i',m:'Log daily metrics to unlock AI insights'});
  return ins.slice(0,4);
}

function Ring({score,size=200}){
  const [on,setOn]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setOn(true),200);return()=>clearTimeout(t);},[]);
  const r=size/2-14,circ=2*Math.PI*r;
  const off=on&&score!=null?circ*(1-score/100):circ;
  const col=score!=null?SC(score):'#1e293b';
  return html`
    <div style=${{position:'relative',width:size,height:size,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <div class="gp" style=${{position:'absolute',inset:-30,borderRadius:'50%',background:score!=null?`radial-gradient(circle,${SG(score)} 0%,transparent 65%)`:'transparent'}}></div>
      <svg width=${size} height=${size} style=${{transform:'rotate(-90deg)',position:'absolute',zIndex:1}}>
        <circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="10"/>
        ${score!=null&&html`<circle cx=${size/2} cy=${size/2} r=${r} fill="none" stroke=${col} strokeWidth="10" strokeLinecap="round"
          strokeDasharray=${circ+' '+circ} strokeDashoffset=${off}
          style=${{transition:'stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)',filter:`drop-shadow(0 0 14px ${col}) drop-shadow(0 0 28px ${col}55)`}}/>`}
        ${Array.from({length:36},(_,i)=>{const a=(i/36)*2*Math.PI,ri=r-18,ro=r-13;
          return html`<line key=${i} x1=${(size/2+Math.cos(a)*ri).toFixed(1)} y1=${(size/2+Math.sin(a)*ri).toFixed(1)} x2=${(size/2+Math.cos(a)*ro).toFixed(1)} y2=${(size/2+Math.sin(a)*ro).toFixed(1)} stroke="rgba(255,255,255,.05)" strokeWidth="1"/>`;})}
      </svg>
      <div style=${{position:'absolute',textAlign:'center',zIndex:2}}>
        <div style=${{fontSize:8,color:'#334155',fontWeight:700,textTransform:'uppercase',letterSpacing:'.22em',marginBottom:4}}>SYSTEM STATUS</div>
        <div class="ac" style=${{fontSize:score!=null?46:24,fontWeight:900,letterSpacing:'-2px',lineHeight:1,color:score!=null?col:'#1e293b',textShadow:score!=null?`0 0 28px ${col}99`:'none'}}>${score!=null?score:'—'}</div>
        ${score!=null&&html`<div style=${{fontSize:8,fontWeight:700,letterSpacing:'.16em',color:col,marginTop:6,textTransform:'uppercase'}}>${SL(score)}</div>`}
      </div>
    </div>`;
}

function Chart({data,color,h=65}){
  const W=280,vals=data.map(d=>d?.v??null),filled=vals.filter(v=>v!=null);
  if(filled.length<2)return html`<div style=${{height:h,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#1e293b',gap:8}}><span style=${{width:24,height:1,display:'block',background:'rgba(255,255,255,.06)'}}></span>No data yet<span style=${{width:24,height:1,display:'block',background:'rgba(255,255,255,.06)'}}></span></div>`;
  const lo=Math.max(0,Math.min(...filled)-5),hi=Math.min(100,Math.max(...filled)+5),rng=hi-lo||10,n=vals.length;
  const px=(i,v)=>({x:(i/(n-1))*W,y:h-((v-lo)/rng)*(h*.85)-h*.07});
  let path='',area='',go=false;const pts=[];
  for(let i=0;i<n;i++){const v=vals[i];if(v==null){go=false;continue;}const p=px(i,v);pts.push(p);
    if(!go){path+=`M${p.x.toFixed(1)} ${p.y.toFixed(1)}`;area+=`M${p.x.toFixed(1)} ${h}`;go=true;}
    else path+=` L${p.x.toFixed(1)} ${p.y.toFixed(1)}`;
    area+=` L${p.x.toFixed(1)} ${p.y.toFixed(1)}`;}
  if(pts.length)area+=` L${pts[pts.length-1].x.toFixed(1)} ${h} Z`;
  const gid='g'+color.replace('#','');
  return html`
    <svg viewBox="0 0 ${W} ${h}" width="100%" height=${h} preserveAspectRatio="none" style=${{overflow:'visible'}}>
      <defs><linearGradient id=${gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor=${color} stopOpacity="0.25"/><stop offset="100%" stopColor=${color} stopOpacity="0"/></linearGradient></defs>
      ${area&&html`<path d=${area} fill=${'url(#'+gid+')'}/>`}
      ${path&&html`<path d=${path} fill="none" stroke=${color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style=${{filter:`drop-shadow(0 0 4px ${color})`}}/>`}
      ${pts.slice(-1).map((p,i)=>html`<circle key=${i} cx=${p.x.toFixed(1)} cy=${p.y.toFixed(1)} r="3" fill=${color} style=${{filter:`drop-shadow(0 0 5px ${color})`}}/>`)}
    </svg>`;
}

function TaskCard({icon,label,sub,color,done,onToggle}){
  return html`
    <div onClick=${onToggle} style=${{border:`1px solid ${done?color+'44':'rgba(255,255,255,.07)'}`,borderRadius:13,padding:'14px 16px',cursor:'pointer',background:done?`linear-gradient(135deg,${color}10,${color}06)`:'rgba(255,255,255,.015)',transition:'all .2s',position:'relative',overflow:'hidden'}}>
      ${done&&html`<div style=${{position:'absolute',inset:0,background:`radial-gradient(ellipse at top left,${color}14,transparent 65%)`,pointerEvents:'none'}}></div>`}
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',position:'relative'}}>
        <div style=${{display:'flex',alignItems:'center',gap:11}}>
          <div style=${{width:40,height:40,borderRadius:11,background:done?`${color}1e`:'rgba(255,255,255,.04)',border:`1px solid ${done?color+'44':'rgba(255,255,255,.06)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,boxShadow:done?`0 0 16px ${color}44`:undefined,transition:'all .2s'}}>${icon}</div>
          <div>
            <div style=${{fontSize:13,fontWeight:700,color:done?color:'#e2e8f0',transition:'color .2s',marginBottom:2}}>${label}</div>
            <div style=${{fontSize:10,color:done?color+'88':'#334155'}}>${sub}</div>
          </div>
        </div>
        <div style=${{width:22,height:22,borderRadius:'50%',border:`2px solid ${done?color:'rgba(255,255,255,.1)'}`,background:done?color:'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'white',fontWeight:800,transition:'all .25s',boxShadow:done?`0 0 10px ${color}66`:undefined}}>${done?'✓':''}</div>
      </div>
    </div>`;
}

function MetricCard({icon,label,val,tgt,unit,color,step,min,max,inv,onChange}){
  const pct=tgt&&val!=null?Math.min(100,Math.round((val/tgt)*100)):null;
  const hit=inv?(val!=null&&val<=tgt):(pct!=null&&pct>=100);
  const c=hit?'#10b981':color;
  const dv=val!=null?(Number.isInteger(val)?val:parseFloat(val.toFixed(1))):null;
  return html`
    <div class="card" style=${{padding:'13px 13px 11px',borderLeft:`2px solid ${val!=null?c+'77':'rgba(255,255,255,.04)'}`,transition:'border-color .3s'}}>
      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
        <div style=${{display:'flex',alignItems:'center',gap:5}}>
          <span style=${{fontSize:13}}>${icon}</span>
          <span style=${{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em'}}>${label}</span>
        </div>
        ${hit&&html`<div style=${{width:6,height:6,borderRadius:'50%',background:c,boxShadow:`0 0 7px ${c}`}}></div>`}
      </div>
      <div style=${{display:'flex',alignItems:'baseline',gap:3,marginBottom:9}}>
        <span style=${{fontSize:24,fontWeight:800,letterSpacing:'-.5px',color:val!=null?c:'#1e293b',textShadow:val!=null?`0 0 18px ${c}55`:undefined,transition:'color .3s'}}>${dv!=null?dv:'—'}</span>
        ${unit&&html`<span style=${{fontSize:10,color:'#475569'}}>${unit}</span>`}
        ${tgt&&val!=null&&html`<span style=${{fontSize:9,color:'#334155',marginLeft:2}}>/ ${tgt}</span>`}
      </div>
      <div style=${{display:'flex',alignItems:'center',gap:5}}>
        <button class="bsm" onClick=${e=>{e.stopPropagation();onChange(Math.max(min,(val??tgt)-step));}}>−</button>
        <div class="trk" style=${{flex:1}}><div class="fil" style=${{width:`${pct||0}%`,background:c,boxShadow:`0 0 5px ${c}55`}}></div></div>
        <button class="bsm" onClick=${e=>{e.stopPropagation();onChange(Math.min(max,(val??tgt)+step));}}>+</button>
      </div>
    </div>`;
}

function EnergyCard({val,onChange}){
  const c=val!=null?(val>=7?'#10b981':val>=4?'#f59e0b':'#ef4444'):C.energy.m;
  return html`
    <div class="card" style=${{padding:'13px 13px 11px',borderLeft:`2px solid ${val!=null?c+'77':'rgba(255,255,255,.04)'}`,transition:'border-color .3s'}}>
      <div style=${{display:'flex',alignItems:'center',gap:5,marginBottom:7}}>
        <span style=${{fontSize:13}}>⚡</span>
        <span style=${{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em'}}>Energy</span>
      </div>
      <div style=${{fontSize:24,fontWeight:800,letterSpacing:'-.5px',color:val!=null?c:'#1e293b',marginBottom:9,textShadow:val!=null?`0 0 18px ${c}55`:undefined}}>${val!=null?`${val}/10`:'—'}</div>
      <div style=${{display:'flex',gap:2}}>${Array.from({length:10},(_,i)=>html`<div key=${i} onClick=${()=>onChange(i+1)} style=${{flex:1,height:15,borderRadius:3,cursor:'pointer',transition:'all .12s',background:val!=null&&i<val?(i<3?'#ef4444':i<6?'#f59e0b':'#10b981'):'rgba(255,255,255,.04)',boxShadow:val!=null&&i<val?`0 0 4px ${i<3?'#ef4444':i<6?'#f59e0b':'#10b981'}55`:undefined}}></div>`)}</div>
    </div>`;
}

function Sidebar({page,setPage,score}){
  const col=score!=null?SC(score):'#8b5cf6';
  const nav=[['dashboard','⊞','Dashboard'],['analytics','↗','Analytics'],['reviews','◈','Reviews'],['goals','◎','Goals'],['settings','⚙','Settings']];
  return html`
    <div style=${{width:214,background:'rgba(0,0,0,.55)',borderRight:'1px solid rgba(255,255,255,.05)',display:'flex',flexDirection:'column',flexShrink:0,backdropFilter:'blur(24px)'}}>
      <div style=${{padding:'18px 16px 13px',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
        <div style=${{display:'flex',alignItems:'center',gap:10}}>
          <div style=${{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,#8b5cf6,#06b6d4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,boxShadow:'0 4px 16px rgba(139,92,246,.5)'}}>⚡</div>
          <div><div style=${{fontSize:14,fontWeight:800,letterSpacing:'-.3px'}}>Performance</div><div style=${{fontSize:9,color:'#475569',fontWeight:600,letterSpacing:'.14em',textTransform:'uppercase'}}>OS v2</div></div>
        </div>
      </div>
      <div style=${{padding:'10px 12px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
        <div style=${{background:'rgba(255,255,255,.025)',borderRadius:10,padding:'10px 12px',border:`1px solid ${col}33`}}>
          <div style=${{fontSize:8.5,color:'#334155',textTransform:'uppercase',letterSpacing:'.14em',marginBottom:4}}>Today's Score</div>
          <div style=${{fontSize:28,fontWeight:900,letterSpacing:'-1px',color:col,textShadow:`0 0 20px ${col}55`}}>${score!=null?score:'—'}</div>
          ${score!=null&&html`<div style=${{fontSize:8,color:col,fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',marginTop:2,opacity:.8}}>${SL(score)}</div>`}
        </div>
      </div>
      <nav style=${{padding:'8px',flex:1}}>${nav.map(([id,ico,lbl])=>html`
        <div key=${id} class=${`nav${page===id?' active':''}`} onClick=${()=>setPage(id)}>
          <span style=${{fontSize:14,lineHeight:1}}>${ico}</span><span>${lbl}</span>
        </div>`)}
      </nav>

              <div>
                <div style=${{fontSize:9.5,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Goal Title</div>
                <input class="inp" placeholder="e.g. Get visible abs" value=${form.title} onInput=${e=>ff('title',e.target.value)}/>
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Category</div>
                  <select class="inp" value=${form.cat} onChange=${e=>{const cat=catOf(e.target.value);ff('cat',e.target.value);ff('icon',cat.i);ff('color',cat.c);}}>${CATS.map(c=>html`<option key=${c.id} value=${c.id}>${c.i} ${c.l}</option>`)}</select>
                </div>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Unit</div>
                  <input class="inp" placeholder="kg, %, km, reps..." value=${form.unit} onInput=${e=>ff('unit',e.target.value)}/>
                </div>
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                ${[['start','Start'],['current','Current'],['target','Target']].map(([k,l])=>html`
                  <div key=${k}>
                    <div style=${{fontSize:9.5,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>${l}</div>
                    <input type="number" class="inp" value=${form[k]} onChange=${e=>ff(k,parseFloat(e.target.value)||0)} style=${{colorScheme:'dark'}}/>
                  </div>`)}
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Direction</div>
                  <select class="inp" value=${form.dir} onChange=${e=>ff('dir',e.target.value)}><option value="up">↑ Higher is better</option><option value="down">↓ Lower is better</option></select>
                </div>
                <div>
                  <div style=${{fontSize:9.5,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:6}}>Deadline</div>
                  <input type="date" class="inp" value=${form.deadline||''} onChange=${e=>ff('deadline',e.target.value)} style=${{colorScheme:'dark'}}/>
                </div>
              </div>
              <div style=${{display:'flex',gap:8,marginTop:4}}>
                <button class="btnp" style=${{flex:1}} onClick=${save}>${editId?'Update':'Add Goal'}</button>
                <button onClick=${()=>{setShowAdd(false);setEditId(null);}} style=${{padding:'10px 18px',borderRadius:9,border:'1px solid rgba(255,255,255,.08)',background:'transparent',color:'#64748b',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Cancel</button>
              </div>
            </div>
          </div>
        </div>`}
    </div>`;
}

function Settings({tgts,setTgts,settings,setSettings}){
  const [tf,setTf]=useState(tgts);
  const [ok,setOk]=useState(false);
  const saveTgts=()=>{setTgts(tf);sv(TK,tf);setOk(true);setTimeout(()=>setOk(false),2000);};
  const exportData=()=>{
    const d={logs:ld(LK)||[],targets:ld(TK)||DT,goals:ld(GK)||DG,settings:ld(SK)||DS,exported:new Date().toISOString()};
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'})),download:`perf-os-${today()}.json`});
    a.click();
  };
  const importData=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.logs)sv(LK,d.logs);if(d.targets)sv(TK,d.targets);if(d.goals)sv(GK,d.goals);alert('Imported! Reload to see changes.');}catch{alert('Invalid file.');}};r.readAsText(file);
  };
  const flds=[
    {k:'calories',l:'Daily Calorie Target',u:'kcal',i:'🔥',s:50,mn:1000,mx:5000},
    {k:'protein',l:'Protein Target',u:'g',i:'🥩',s:5,mn:50,mx:300},
    {k:'sleep',l:'Sleep Target',u:'h',i:'😴',s:.5,mn:4,mx:12},
    {k:'steps',l:'Steps Target',u:'',i:'👟',s:500,mn:1000,mx:30000},
    {k:'gymPerWeek',l:'Gym Sessions/Week',u:'x/wk',i:'🏋️',s:1,mn:1,mx:7},
    {k:'water',l:'Water Target',u:'L',i:'💧',s:.25,mn:1,mx:6},
  ];
  return html`
    <div style=${{padding:'17px 21px',height:'100%',overflowY:'auto'}}>
      <div style=${{marginBottom:16}}><div style=${{fontSize:20,fontWeight:800,letterSpacing:'-.3px',marginBottom:2}}>Settings</div><div style=${{fontSize:12,color:'#475569'}}>Targets, preferences, and data</div></div>
      <div class="card" style=${{padding:'17px',marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:13}}>Daily Targets</div>
        <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(195px,1fr))',gap:9,marginBottom:13}}>
          ${flds.map(({k,l,u,i,s,mn,mx})=>html`
            <div key=${k} style=${{padding:'11px',background:'rgba(255,255,255,.02)',borderRadius:10,border:'1px solid rgba(255,255,255,.05)'}}>
              <div style=${{display:'flex',alignItems:'center',gap:6,marginBottom:9}}><span style=${{fontSize:13}}>${i}</span><span style=${{fontSize:11,fontWeight:700,color:'#e2e8f0'}}>${l}</span></div>
              <div style=${{display:'flex',alignItems:'center',gap:6}}>
                <button class="bsm" onClick=${()=>setTf(p=>({...p,[k]:Math.max(mn,p[k]-s)}))}> −</button>
                <input type="number" value=${tf[k]} onChange=${e=>{const n=parseFloat(e.target.value);if(!isNaN(n))setTf(p=>({...p,[k]:Math.min(mx,Math.max(mn,n))}));}} style=${{flex:1,textAlign:'center',fontSize:17,fontWeight:800,color:'#f1f5f9',background:'transparent',border:'none',borderBottom:'1px solid rgba(255,255,255,.08)',outline:'none',padding:'3px 0',colorScheme:'dark',fontFamily:'inherit'}}/>
                <span style=${{fontSize:10,color:'#475569',minWidth:22,textAlign:'right'}}>${u}</span>
                <button class="bsm" onClick=${()=>setTf(p=>({...p,[k]:Math.min(mx,p[k]+s)}))}>+</button>
              </div>
            </div>`)}
        </div>
        <button onClick=${saveTgts} style=${{padding:'9px 22px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,background:ok?'rgba(16,185,129,.15)':'linear-gradient(135deg,#8b5cf6,#06b6d4)',color:ok?'#10b981':'white',transition:'all .3s',fontFamily:'inherit'}}>${ok?'✓ Saved':'Save Targets'}</button>
      </div>
      <div class="card" style=${{padding:'17px',marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:13}}>Preferences</div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div><div style=${{fontSize:11,fontWeight:600,color:'#94a3b8',marginBottom:6}}>Units</div><select class="inp" value=${settings.units} onChange=${e=>setSettings(s=>({...s,units:e.target.value}))}><option value="metric">Metric (kg, km)</option><option value="imperial">Imperial (lbs, mi)</option></select></div>
          <div><div style=${{fontSize:11,fontWeight:600,color:'#94a3b8',marginBottom:6}}>Week Starts On</div><select class="inp" value=${settings.weekStart} onChange=${e=>setSettings(s=>({...s,weekStart:e.target.value}))}><option value="mon">Monday</option><option value="sun">Sunday</option></select></div>
        </div>
      </div>
      <div class="card" style=${{padding:'17px',marginBottom:10}}>
        <div style=${{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:13}}>Data Management</div>
        <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick=${exportData} style=${{padding:'9px 15px',borderRadius:8,border:'1px solid rgba(139,92,246,.25)',background:'rgba(139,92,246,.06)',color:'#a78bfa',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>↓ Export JSON</button>
          <label style=${{padding:'9px 15px',borderRadius:8,border:'1px solid rgba(6,182,212,.25)',background:'rgba(6,182,212,.06)',color:'#22d3ee',fontSize:12,fontWeight:700,cursor:'pointer'}}>↑ Import JSON<input type="file" accept=".json" onChange=${importData} style=${{display:'none'}}/></label>
          <button class="btnd" onClick=${()=>{if(confirm('Clear ALL data?')){localStorage.clear();window.location.reload();}}}>✕ Clear All Data</button>
        </div>
      </div>
      <div class="card" style=${{padding:'17px'}}>
        <div style=${{fontSize:9,fontWeight:700,color:'#475569',textTransform:'uppercase',letterSpacing:'.12em',marginBottom:10}}>About</div>
        <p style=${{fontSize:12,color:'#64748b',lineHeight:1.9}}><strong style=${{color:'#94a3b8'}}>Performance OS v2.0</strong> — Your personal mission control.<br/>All data stored locally. No account, no cloud, no tracking.</p>
      </div>
    </div>`;
}

function App(){
  const [logs,setLogs]=useState([]),[tgts,setTgts]=useState(DT),[goals,setGoals]=useState(DG),[settings,setSettings]=useState(DS),[page,setPage]=useState('dashboard');
  useEffect(()=>{setLogs(loadLogs());setTgts({...DT,...(ld(TK)||{})});setGoals(ld(GK)||DG);setSettings({...DS,...(ld(SK)||{})});},[]);
  const onChange=up=>{const n=upsert(logs,up);setLogs(n);saveLogs(n);};
  const saveGoals=g=>{setGoals(g);sv(GK,g);};
  const saveSettings=s=>{setSettings(s);sv(SK,s);};
  const saveTgts=t=>{setTgts(t);sv(TK,t);};
  const score=calcScore(getTodayLog(logs),tgts);
  const bg=score!=null?`radial-gradient(ellipse 72% 32% at 50% -6%,${SG(score)} 0%,transparent 55%)`:'radial-gradient(ellipse 72% 32% at 50% -6%,rgba(139,92,246,.1) 0%,transparent 55%)';
  return html`
    <div style=${{display:'flex',height:'100vh',background:'#05050a',backgroundImage:bg,overflow:'hidden'}}>
      <${Sidebar} page=${page} setPage=${setPage} score=${score}/>
      <main style=${{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        ${page==='dashboard'&&html`<${Dashboard} logs=${logs} tgts=${tgts} onChange=${onChange}/>`}
        ${page==='analytics'&&html`<${Analytics} logs=${logs} tgts=${tgts}/>`}
        ${page==='reviews'&&html`<${Reviews} logs=${logs} tgts=${tgts}/>`}
        ${page==='goals'&&html`<${Goals} goals=${goals} setGoals=${saveGoals}/>`}
        ${page==='settings'&&html`<${Settings} tgts=${tgts} setTgts=${saveTgts} settings=${settings} setSettings=${saveSettings}/>`}
      </main>
    </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
